<script>
// Clé de chiffrement données : dérivée du salt PIN via PBKDF2
// → unique par appareil, non stockée en dur dans le code
// Clé de chiffrement des données — passphrase + salt FIXES dans le code
// → clé IDENTIQUE sur tous les appareils et après vidage du cache
// → les données Google Sheets restent toujours récupérables
const _DATA_PASS="BudgetFamilial#Gilles&Murielle#2026";
const _DATA_SALT_FIXED="YnVkZ2V0ZmFtaWxpYWwyMDI2"; // base64 de "budgetfamilial2026"
let _dataKey=null;
async function getDataKey(){
  if(_dataKey)return _dataKey;
  const baseKey=await crypto.subtle.importKey(
    "raw",new TextEncoder().encode(_DATA_PASS),{name:"PBKDF2"},false,["deriveKey"]
  );
  _dataKey=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:Uint8Array.from(atob(_DATA_SALT_FIXED),c=>c.charCodeAt(0)),iterations:100000,hash:"SHA-256"},
    baseKey,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]
  );
  return _dataKey;
}
async function encryptData(obj){
  const key=await getDataKey();
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const enc=await crypto.subtle.encrypt(
    {name:"AES-GCM",iv},key,
    new TextEncoder().encode(JSON.stringify(obj))
  );
  return JSON.stringify({
    iv:btoa(String.fromCharCode(...iv)),
    d:btoa(String.fromCharCode(...new Uint8Array(enc)))
  });
}
async function decryptData(str){
  if(!str||str.trim().length<2)return null;
  try{
    const parsed=JSON.parse(str);
    // Format chiffré : {iv, d}
    if(parsed&&parsed.iv&&parsed.d){
      try{
        const key=await getDataKey();
        const dec=await crypto.subtle.decrypt(
          {name:"AES-GCM",iv:Uint8Array.from(atob(parsed.iv),c=>c.charCodeAt(0))},
          key,new Uint8Array(Array.from(atob(parsed.d),c=>c.charCodeAt(0)))
        );
        return JSON.parse(new TextDecoder().decode(dec));
      }catch{
        // Déchiffrement échoué (ex: ancien salt) → les données sont perdues côté chiffré
        // mais on tente quand même de lire comme JSON brut au cas où
        return null;
      }
    }
    // Format JSON brut non chiffré (ancien format ou fallback)
    if(typeof parsed==="object"&&parsed!==null)return parsed;
    return null;
  }catch{return null;}
}

// URL chiffrée AES-256-GCM — clé dérivée via PBKDF2 (jamais stockée en clair)
const _GAS={
  s:"O23YaZnjX4KagcXHfZ31lA==",
  i:"Edu8sm7C5LzSUKcp",
  d:"tWs2OFmEgnUoispZ2gVHeBSp9CKBuFeD2YxqD7Y7rFXr3thY+ysKuaN0vHegHgQg/YRJRzE4s7/6XfmWHoVL5u6zA7+F/B61Ok/bohuHJCC6eWsXIuPKkKBnfCbOM6qlpdS7I2LB+Hs3y6/QUnn2slt3G1lFla/NjZX2HapGqVQ="
};
async function _getGasUrl(){
  // Dériver la clé via PBKDF2 — aucune clé fixe dans le code
  const km=await crypto.subtle.importKey(
    "raw",new TextEncoder().encode("BudgetFamilialGAS2026"),
    {name:"PBKDF2"},false,["deriveKey"]
  );
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:Uint8Array.from(atob(_GAS.s),c=>c.charCodeAt(0)),iterations:100000,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]
  );
  const dec=await crypto.subtle.decrypt(
    {name:"AES-GCM",iv:Uint8Array.from(atob(_GAS.i),c=>c.charCodeAt(0))},
    key,Uint8Array.from(atob(_GAS.d),c=>c.charCodeAt(0))
  );
  return new TextDecoder().decode(dec);
}
let GAS_URL=null; // sera rempli au démarrage
const PIN_KEY="bf-pin",PIN_AUTH_KEY="bf-pin-auth",PIN_TRIES_KEY="bf-pin-tries",PIN_BLOCK_KEY="bf-pin-block";
const AUTH_DURATION=30*60*1000,MAX_TRIES=3,BLOCK_DURATION=3*60*1000;
const TOTAL_TRIES_KEY="bf-total-tries";
const MAX_TOTAL_TRIES=10; // blocage permanent après 10 tentatives au total
function getTotalTries(){return parseInt(localStorage.getItem(TOTAL_TRIES_KEY)||"0");}
function incTotalTries(){localStorage.setItem(TOTAL_TRIES_KEY,String(getTotalTries()+1));}
function isPermBlocked(){return getTotalTries()>=MAX_TOTAL_TRIES;}
const CATEGORIES_BASE=["logement","assurances","abonnements","crédits","vie courante","transport","enfants","animaux","autre"];
const CAT_COLORS_EXTRA=["#6366f1","#0ea5e9","#d946ef","#f97316","#14b8a6","#a855f7","#eab308","#78716c"];
// ── localStorage chiffré pour les préférences ──────────────────────────────
async function lsSet(key,val){
  try{
    const enc=await encryptData(val);
    localStorage.setItem(key,enc);
  }catch{
    try{localStorage.setItem(key,JSON.stringify(val));}catch{}
  }
}
async function lsGet(key){
  try{
    const v=localStorage.getItem(key);
    if(!v)return null;
    const dec=await decryptData(v);
    return dec;
  }catch{return null;}
}
// ── Catégories ───────────────────────────────────────────────────────────────
const CATS_KEY="bf-cats-v2"; // clé v2 pour repartir propre
function getCats(){
  try{
    const v=localStorage.getItem(CATS_KEY);
    if(v){const p=JSON.parse(v);if(Array.isArray(p)&&p.length>0)return p;}
  }catch{}
  // Migration depuis ancienne clé
  try{
    const old=localStorage.getItem("bf-cats");
    if(old){const p=JSON.parse(old);if(Array.isArray(p)&&p.length>0){localStorage.setItem(CATS_KEY,JSON.stringify(p));localStorage.removeItem("bf-cats");return p;}}
  }catch{}
  return[...CATEGORIES_BASE];
}
function saveCats(cats){
  try{localStorage.setItem(CATS_KEY,JSON.stringify(cats));}catch{}
}
const CAT_COLORS={logement:"#3B82F6",assurances:"#10B981",abonnements:"#8B5CF6","crédits":"#EF4444","vie courante":"#F59E0B",transport:"#06B6D4",enfants:"#EC4899",animaux:"#84CC16",autre:"#9CA3AF"};
const CAT_COLORS_KEY="bf-cat-colors-v2";
function getCatCustomColors(){
  try{const v=localStorage.getItem(CAT_COLORS_KEY);if(v)return JSON.parse(v);}catch{}
  try{const old=localStorage.getItem("bf-cat-colors");if(old){const p=JSON.parse(old);localStorage.setItem(CAT_COLORS_KEY,JSON.stringify(p));localStorage.removeItem("bf-cat-colors");return p;}}catch{}
  return{};
}
function saveCatCustomColor(cat,color){
  const cc=getCatCustomColors();cc[cat]=color;
  try{localStorage.setItem(CAT_COLORS_KEY,JSON.stringify(cc));}catch{}
}
function delCatCustomColor(cat){
  const cc=getCatCustomColors();delete cc[cat];
  try{localStorage.setItem(CAT_COLORS_KEY,JSON.stringify(cc));}catch{}
}
function getCatColor(cat){const custom=getCatCustomColors()[cat];if(custom)return custom;return CAT_COLORS[cat]||(CAT_COLORS_EXTRA[getCats().indexOf(cat)%CAT_COLORS_EXTRA.length]||"#9CA3AF");}
function addCustomCat(nom,color){
  const n=nom.trim().toLowerCase();if(!n)return false;
  const cats=getCats();if(cats.includes(n))return false;
  cats.push(n);saveCats(cats);
  if(color)saveCatCustomColor(n,color);
  return true;
}
function delCustomCat(nom){
  const cats=getCats().filter(c=>c!==nom);saveCats(cats);
  delCatCustomColor(nom);
}
function delCatAndReassign(nom){
  // Supprimer la catégorie (native ou perso)
  const cats=getCats().filter(c=>c!==nom);
  saveCats(cats);
  delCatCustomColor(nom);
  // Réaffecter toutes les dépenses de cette catégorie à "autre" dans TOUS les mois
  const months=STATE.months;
  let changed=false;
  Object.keys(months).forEach(k=>{
    const m=months[k];
    const newDeps=m.depenses.map(d=>{
      if(d.categorie===nom){changed=true;return{...d,categorie:"autre"};}
      return d;
    });
    months[k]={...m,depenses:newDeps};
  });
  DB.save(months);
  STATE.months={...months};
  notify(changed?"✓ Catégorie supprimée — dépenses réaffectées à \"autre\"":"✓ Catégorie supprimée");
}
const COMMERCES_BASE=["Leclerc","Lidl","Aldi","Carrefour","Intermarché","Super U","Casino","Monoprix","Franprix","Picard","Biocoop","Grand Frais"];

// Commerces stockés en JSON simple (synchrone) — pas de chiffrement async
// pour éviter les problèmes de timing lors de la lecture/écriture
const COMMERCES_KEY="bf-commerces-v2"; // clé v2 pour repartir propre

function getCommerces(){
  try{
    const v=localStorage.getItem(COMMERCES_KEY);
    if(v){
      const list=JSON.parse(v);
      if(Array.isArray(list)&&list.length>0)return list;
    }
  }catch{}
  // Essayer l'ancienne clé (migration)
  try{
    const old=localStorage.getItem("bf-commerces");
    if(old){
      const p=JSON.parse(old);
      if(Array.isArray(p)&&p.length>0){
        // Migrer vers nouvelle clé
        localStorage.setItem(COMMERCES_KEY,JSON.stringify(p));
        localStorage.removeItem("bf-commerces");
        return p;
      }
    }
  }catch{}
  return[...COMMERCES_BASE];
}

function saveCommerces(list){
  // Synchrone — pas d'async pour garantir la cohérence
  try{localStorage.setItem(COMMERCES_KEY,JSON.stringify(list));}catch{}
}

function addCommerce(nom){
  const n=nom.trim();
  if(!n)return false;
  const list=getCommerces();
  if(list.map(x=>x.toLowerCase()).includes(n.toLowerCase()))return false;
  list.push(n);
  saveCommerces(list);
  return true;
}
function delCommerce(nom){
  const list=getCommerces().filter(c=>c!==nom);
  saveCommerces(list);
}
const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const fmt=n=>(parseFloat(n)||0).toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
const nowKey=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
const keyLabel=k=>{const[y,m]=k.split("-");return `${MOIS[+m-1]} ${y}`;};
const uid=()=>"x"+Date.now()+Math.random().toString(36).slice(2);
const todayStr=()=>{const d=new Date();return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;};

// PIN — PBKDF2 avec salt unique par appareil
const PIN_SALT_KEY="bf-pin-salt";
function getPinSalt(){
  let salt=localStorage.getItem(PIN_SALT_KEY);
  if(!salt){
    // Générer un salt aléatoire unique pour cet appareil
    const arr=crypto.getRandomValues(new Uint8Array(16));
    salt=btoa(String.fromCharCode(...arr));
    localStorage.setItem(PIN_SALT_KEY,salt);
  }
  return salt;
}
async function hashPin(pin){
  // PBKDF2 : résistant aux rainbow tables et au brute-force
  const keyMaterial=await crypto.subtle.importKey(
    "raw",new TextEncoder().encode(pin),{name:"PBKDF2"},false,["deriveBits"]
  );
  const saltBytes=Uint8Array.from(atob(getPinSalt()),c=>c.charCodeAt(0));
  const bits=await crypto.subtle.deriveBits(
    {name:"PBKDF2",salt:saltBytes,iterations:100000,hash:"SHA-256"},
    keyMaterial,256
  );
  return btoa(String.fromCharCode(...new Uint8Array(bits)));
}
function getPinHash(){return localStorage.getItem(PIN_KEY)||null;}
function setPinHash(hash){localStorage.setItem(PIN_KEY,hash);}
function hasPin(){return !!localStorage.getItem(PIN_KEY);}
async function migratePin(){
  const stored=localStorage.getItem(PIN_KEY);
  // Si stocké en hex SHA-256 (64 chars) ou en clair (4 chars) → migrer en PBKDF2
  if(stored&&stored.length!==44){
    // On ne peut pas migrer un hash SHA-256 sans le PIN original
    // On force une nouvelle création de PIN
    localStorage.removeItem(PIN_KEY);
    localStorage.removeItem(PIN_AUTH_KEY);
  }
}
function isAuthed(){const t=localStorage.getItem(PIN_AUTH_KEY);return t&&Date.now()-parseInt(t)<AUTH_DURATION;}
function setAuthed(){localStorage.setItem(PIN_AUTH_KEY,String(Date.now()));}
function getTries(){return parseInt(localStorage.getItem(PIN_TRIES_KEY)||"0");}
function setTries(n){localStorage.setItem(PIN_TRIES_KEY,String(n));}
function getBlockUntil(){return parseInt(localStorage.getItem(PIN_BLOCK_KEY)||"0");}
function setBlock(){localStorage.setItem(PIN_BLOCK_KEY,String(Date.now()+BLOCK_DURATION));}
function clearBlock(){localStorage.removeItem(PIN_BLOCK_KEY);localStorage.removeItem(PIN_TRIES_KEY);}

// Extrait les données budget et restaure les méta (commerces/cats) depuis un payload
function extractAndRestore(payload){
  if(!payload||typeof payload!=="object")return null;
  // Restaurer commerces/cats/couleurs si présents dans le payload
  if(payload._meta){
    const m=payload._meta;
    if(Array.isArray(m.commerces)&&m.commerces.length>0)
      saveCommerces(m.commerces);
    if(Array.isArray(m.cats)&&m.cats.length>0)
      saveCats(m.cats);
    if(m.catColors&&typeof m.catColors==="object")
      Object.entries(m.catColors).forEach(([k,v])=>saveCatCustomColor(k,v));
    // Retourner les données sans le _meta
    const {_meta,...data}=payload;
    return Object.keys(data).length>0?data:null;
  }
  return payload;
}
let _pendingSave=null; // données en attente d'envoi vers GAS

const DB={
  async load(){
    console.log("[DB.load] Début chargement...");
    // 1) Google Sheets en priorité — source de vérité partagée
    try{
      const r=await fetch(GAS_URL,{redirect:"follow"});
      const t=await r.text();
      console.log("[DB.load] GAS répond, taille:", t.length, "chars, début:", t.substring(0,50));
      if(t&&t.trim().length>2){
        // Tenter déchiffrement (ancien format)
        try{
          const dec=await decryptData(t);
          if(dec&&typeof dec==="object"&&!Array.isArray(dec)){
            const raw=dec.data&&dec.ts?dec.data:dec;
            const d=extractAndRestore(raw);
            if(d&&Object.keys(d).length>0){
              console.log("[DB.load] ✅ Données GAS chiffrées OK, mois:", Object.keys(d).join(','));
              try{const enc=await encryptData(raw);localStorage.setItem("bf-local",enc);}catch{}
              try{localStorage.setItem("bf-local-json",JSON.stringify(raw));}catch{}
              return d;
            }
          }
        }catch{}
        // JSON brut
        try{
          const p=JSON.parse(t);
          if(p&&typeof p==="object"&&!Array.isArray(p)&&Object.keys(p).length>0){
            const d=extractAndRestore(p);
            if(d){
              console.log("[DB.load] ✅ Données GAS JSON brut OK, mois:", Object.keys(d).join(','));
              try{const enc=await encryptData(p);localStorage.setItem("bf-local",enc);}catch{}
              try{localStorage.setItem("bf-local-json",JSON.stringify(p));}catch{}
              return d;
            }
          }
        }catch{}
      }
    }catch(err){console.warn("[DB.load] ⚠️ GAS échoué:", err.message, "fallback localStorage...");}
    // 2) Fallback localStorage chiffré
    try{
      const v=localStorage.getItem("bf-local");
      if(v){
        try{
          const dec=await decryptData(v);
          if(dec&&typeof dec==="object"&&!Array.isArray(dec)){
            const raw=dec.data&&dec.ts?dec.data:dec;
            const d=extractAndRestore(raw);
            if(d&&Object.keys(d).length>0)return d;
          }
        }catch{}
        try{const p=JSON.parse(v);const d=extractAndRestore(p);if(d&&Object.keys(d).length>0)return d;}catch{}
      }
    }catch{}
    console.log("[DB.load] ⚠️ localStorage chiffré échoué, fallback JSON sync...");
    // 3) Dernier recours : JSON synchrone
    try{
      const v=localStorage.getItem("bf-local-json");
      if(v){const p=JSON.parse(v);const d=extractAndRestore(p);if(d&&Object.keys(d).length>0)return d;}
    }catch{}
    return null;
  },

  async save(data){
    // Enrichir les données avec commerces et catégories personnalisées
    // pour les sauvegarder dans GAS et les retrouver après vidage cache
    const payload={
      ...data,
      _meta:{
        commerces: getCommerces(),
        cats: getCats(),
        catColors: getCatCustomColors(),
        savedAt: Date.now()
      }
    };
    // 1) Sauvegarde locale synchrone IMMÉDIATE
    try{localStorage.setItem("bf-local-json",JSON.stringify(payload));}catch{}
    // 2) Sauvegarde locale chiffrée
    try{
      const enc=await encryptData(payload);
      localStorage.setItem("bf-local",enc);
    }catch{
      try{localStorage.setItem("bf-local",JSON.stringify(payload));}catch{}
    }
    // 3) Envoi GAS IMMÉDIAT
    _pendingSave=payload;
    await DB._send(payload);
  },

  async _send(data){
    const moisKeys=Object.keys(data).filter(k=>k.match(/^\d{4}-\d{2}$/));
    const jsonStr=JSON.stringify(data);
    console.log("[DB._send] Envoi GAS, mois:", moisKeys.join(','), "taille:", jsonStr.length, "chars");

    // Stratégie 1 : GET avec paramètre d (validé fonctionnel)
    try{
      const encoded=encodeURIComponent(jsonStr);
      await fetch(`${GAS_URL}?d=${encoded}`,{mode:"no-cors",redirect:"follow"});
      console.log("[DB._send] ✅ GET ?d= envoyé");
      _pendingSave=null;return;
    }catch(e){console.warn("[DB._send] GET ?d= échoué:",e.message);}

    // Stratégie 2 : POST no-cors
    try{
      await fetch(GAS_URL,{
        method:"POST",
        mode:"no-cors",
        body:jsonStr,
        headers:{"Content-Type":"text/plain"}
      });
      console.log("[DB._send] ✅ POST no-cors envoyé");
      _pendingSave=null;return;
    }catch(e){console.warn("[DB._send] POST échoué:",e.message);}

    // Stratégie 3 : sendBeacon
    try{
      const ok=navigator.sendBeacon(GAS_URL,new Blob([jsonStr],{type:"text/plain"}));
      if(ok){console.log("[DB._send] ✅ sendBeacon envoyé");_pendingSave=null;return;}
    }catch{}

    console.error("[DB._send] ❌ Toutes stratégies échouées, retry 5s");
    setTimeout(()=>{if(_pendingSave)DB._send(_pendingSave);},5000);
  },

  // Envoi forcé et synchrone (pour beforeunload)
  sendSync(data){
    try{
      navigator.sendBeacon(GAS_URL,JSON.stringify(data));
    }catch{}
  }
};

function addCourse(label,montant){
  const mnt=parseFloat(montant)||0;
  if(!mnt)return;
  setMonthsAndRender(m=>({...m,courses:sortCourses([...(m.courses||[]),{id:uid(),date:todayStr(),label:label||"Courses",montant:mnt}])}));
  setState({modal:null});

  setMonthsAndRender(m=>({...m,courses:(m.courses||[]).filter(c=>c.id!==id)}));
}
function sortCourses(courses){
  return [...courses].sort((a,b)=>{
    const [da,ma]=a.date.split("/").map(Number);
    const [db,mb]=b.date.split("/").map(Number);
    if(ma!==mb)return mb-ma; // mois décroissant
    return db-da;            // jour décroissant = plus récent en premier
  });
}
function updateCourse(id,patch){
  setMonthsAndRender(m=>{
    const updated=(m.courses||[]).map(c=>c.id===id?{...c,...patch}:c);
    return{...m,courses:sortCourses(updated)};
  });
}

// PIN logic
function updatePinDots(error=false){
  const dots=document.querySelectorAll(".pin-dot");
  if(!dots.length){render();return;}
  dots.forEach((dot,i)=>{
    dot.className="pin-dot";
    if(STATE.pinInput.length>i)dot.classList.add(error?"error":"filled");
  });
  const errEl=document.querySelector(".pin-error");
  if(errEl)errEl.textContent=STATE.pinError||"";
}
function handlePinDigit(d){
  if(STATE.pinBlocked)return;
  if(isPermBlocked()){
    STATE.pinBlocked=true;STATE.pinBlockLeft="définitivement bloqué";
    render();return;
  }
  const val=STATE.pinInput+d;
  STATE.pinInput=val;STATE.pinError="";
  updatePinDots();
  if(val.length===4){
    if(Date.now()<getBlockUntil()){STATE.pinBlocked=true;STATE.pinInput="";render();startBlockTimer();return;}
    hashPin(val).then(hash=>{
      if(hash===getPinHash()){
        clearBlock();setAuthed();STATE.pinInput="";STATE.pinError="";
        setState({screen:"app"});init();
      } else {
      const tries=getTries()+1;setTries(tries);const left=MAX_TRIES-tries;
      if(tries>=MAX_TRIES){
        setBlock();STATE.pinInput="";STATE.pinError="";STATE.pinBlocked=true;
        render();startBlockTimer();
      } else {
        incTotalTries();
        STATE.pinInput="";
        STATE.pinError=`Code incorrect — ${left} essai${left>1?"s":""} restant${left>1?"s":""}`;
        updatePinDots(true);
        setTimeout(()=>{STATE.pinError="";updatePinDots();},800);
      }
    }
    }); // fin hashPin
  }
}
function handlePinDel(){
  STATE.pinInput=STATE.pinInput.slice(0,-1);
  STATE.pinError="";
  updatePinDots();
}
function startBlockTimer(){
  // Annuler tout timer précédent
  if(window._blockTimer)clearInterval(window._blockTimer);
  window._blockTimer=setInterval(()=>{
    const left=Math.ceil((getBlockUntil()-Date.now())/1000);
    if(left<=0){
      clearInterval(window._blockTimer);window._blockTimer=null;
      clearBlock();
      STATE.pinBlocked=false;STATE.pinBlockLeft="";STATE.pinError="";
      render();
    } else {
      const mins=Math.floor(left/60);
      const secs=left%60;
      const display=mins>0?`${mins}m ${String(secs).padStart(2,"0")}s`:`${secs}s`;
      STATE.pinBlockLeft=display;
      // Mettre à jour uniquement le texte si l'élément existe
      const el=document.getElementById("pin-countdown");
      if(el) el.textContent=`🔒 Accès bloqué — réessayez dans ${display}`;
    }
  },1000);
}

function handleChangePinDigit(d){
  if(STATE.changePinStep===0)return;
  const val=STATE.changePinInput+d;
  STATE.changePinInput=val;STATE.changePinError="";
  updateChangePinDots();
  if(val.length===4){

      else{STATE.changePinInput="";STATE.changePinError="Code actuel incorrect";}

    else if(STATE.changePinStep===2){

    else if(STATE.changePinStep===3){

        hashPin(val).then(h=>{setPinHash(h);});STATE.changePinStep=0;STATE.changePinInput="";STATE.changePinError="";
        setState({modal:null});notify("✓ Code PIN modifié !");
      } else {
        STATE.changePinInput="";STATE.changePinError="Les codes ne correspondent pas";
        updateChangePinDots();
      }
    }
  }
}
function handleChangePinDel(){

function el(tag,attrs={},...ch){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){if(k==="className")e.className=v;else if(k.startsWith("on"))e[k.toLowerCase()]=v;else e.setAttribute(k,v);}
  for(const c of ch.flat()){if(c==null||c===false)continue;e.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  return e;
}
function div(cls,...ch){return el("div",{className:cls},...ch);}
function inp(type,val,onChange,ph=""){const i=el("input",{type,value:val||"",placeholder:ph});i.oninput=e=>onChange(e.target.value);return i;}
function sel(val,opts,onChange){const s=el("select",{});s.onchange=e=>onChange(e.target.value);opts.forEach(o=>{const op=el("option",{value:o});op.textContent=o;if(o===val)op.selected=true;s.appendChild(op);});return s;}

  const grid=div("pin-grid");
  ["1","2","3","4","5","6","7","8","9","","0","⌫"].forEach(d=>{
    if(d===""){grid.appendChild(div("pin-btn empty"));return;}
    const b=div("pin-btn"+(d==="⌫"?" del":""));b.textContent=d;
    b.onclick=()=>d==="⌫"?handleSetupDel():handleSetupDigit(d);
    grid.appendChild(b);
  });
  wrap.appendChild(grid);
  return wrap;
}
function updateSetupDots(){
  const dots=document.querySelectorAll(".pin-screen .pin-dot");
  if(!dots.length)return;
  dots.forEach((dot,i)=>{dot.className="pin-dot";if(STATE.setupInput.length>i)dot.classList.add("filled");});
  const errEl=document.querySelector(".pin-screen .pin-error");
  if(errEl)errEl.textContent=STATE.setupError||"";
}
function handleSetupDigit(d){
  const val=STATE.setupInput+d;
  STATE.setupInput=val;STATE.setupError="";
  updateSetupDots();
  if(val.length===4){
    if(STATE.setupStep===0){
      // Étape 1 : saisie du PIN
      STATE.setupPin=val;STATE.setupStep=1;STATE.setupInput="";
      render(); // recrée l'écran avec le nouveau message
    } else {
      // Étape 2 : confirmation
      if(val===STATE.setupPin){
        hashPin(val).then(hash=>{
          setPinHash(hash);
          setAuthed();
          STATE.setupStep=0;STATE.setupInput="";STATE.setupError="";
          setState({screen:"app"});
          init();
          notify("✅ Code PIN créé !");
        });
      } else {
        STATE.setupStep=0;STATE.setupPin="";STATE.setupInput="";
        STATE.setupError="Les codes ne correspondent pas — recommencez";
        render();
      }
    }
  }
}
function handleSetupDel(){
  STATE.setupInput=STATE.setupInput.slice(0,-1);
  updateSetupDots();
}

  const dots=div("pin-dots");
  for(let i=0;i<4;i++){const d=div("pin-dot");if(STATE.pinInput.length>i)d.classList.add(STATE.pinError?"error":"filled");dots.appendChild(d);}

      if(d===""){grid.appendChild(div("pin-btn empty"));return;}

}

// APP
function renderApp(){
  const{months,curKey,tab,lastSync,toast,modal,monthPick}=STATE;

  const totSal=data.salaires.reduce((a,x)=>a+(+x.montant||0),0);
  const totDep=data.depenses.reduce((a,x)=>a+(+x.montant||0),0);
  const totEco=data.economies.reduce((a,x)=>a+(+x.montant||0),0);
  // Courses réellement dépensées (comptent comme "payé" pour l'alimentation)
  const totalCourses=(data.courses||[]).reduce((a,x)=>a+(+x.montant||0),0);

  // Paye = dépenses cochées (hors alimentation) + courses réelles (plafonnées au budget alim)
  const payeHorsAlim=data.depenses.filter(d=>d.paye&&d.type!=="Alimentation").reduce((a,x)=>a+(+x.montant||0),0);
  const alimentPaye=Math.min(totalCourses, budgetAlim);
  const paye=payeHorsAlim+alimentPaye;
  const solde=totSal-totDep-totEco;
  const wrap=div("");

  // Header
  const hdr=el("header",{});

  const si=div("sync-info");

  tWrap.append(el("h1",{},"💶 Budget Familial"),si);
  const hbtns=div("hbtns");
  const lockB=el("button",{className:"icon-btn",title:"Verrouiller"});lockB.textContent="🔒";lockB.onclick=()=>{localStorage.removeItem(PIN_AUTH_KEY);setState({screen:"pin",pinInput:"",pinError:""});};
  const pinB=el("button",{className:"icon-btn",title:"Changer PIN"});pinB.textContent="🔑";pinB.onclick=()=>setState({modal:{type:"changePin"},changePinStep:1,changePinInput:"",changePinError:""});
  const refB=el("button",{className:"icon-btn",title:"Actualiser"});refB.textContent="⟳";
  refB.onclick=async()=>{
    const d=await DB.load();
    if(d&&Object.keys(d).length>0){
      Object.keys(d).forEach(k=>{if(!d[k].courses)d[k].courses=[];});
      STATE.months=d;STATE.lastSync=new Date();
      STATE.toast={msg:"✓ Actualisé",err:false};
      clearTimeout(STATE.toastTimer);
      STATE.toastTimer=setTimeout(()=>{STATE.toast=null;render();},2800);
      render();
    }
  };
  hbtns.append(lockB,pinB,refB);hrow.append(tWrap,hbtns);
  const mbar=div("mbar");
  const mselB=el("button",{className:"msel"});mselB.textContent=`📅 ${keyLabel(curKey)} ▾`;mselB.onclick=()=>setState({monthPick:!STATE.monthPick});
  const mnewB=el("button",{className:"mnew"});mnewB.textContent="+ Mois";mnewB.onclick=()=>setState({modal:{type:"newMonth"}});
  mbar.append(mselB,mnewB);
  const tabs=div("tabs");
  [["dashboard","📊 Résumé"],["depenses","💸 Dépenses"],["historique","📈 Historique"]].forEach(([id,l])=>{
    const t=el("button",{className:"tab"+(tab===id?" on":"")});t.textContent=l;t.onclick=()=>setState({tab:id});tabs.appendChild(t);
  });
  hdr.append(hrow,mbar,tabs);wrap.appendChild(hdr);

  if(monthPick){
    const ol=div("overlay2");ol.onclick=()=>setState({monthPick:false});

// ── CARTE ALIMENTATION ────────────────────────────────────────────────────────
function renderAlimentationCard(data){
  const courses=data.courses||[];
  const budget=data.depenses.find(d=>d.type==="Alimentation")?.montant||800;
  const depense=courses.reduce((a,c)=>a+(+c.montant||0),0);
  const reste=budget-depense;
  const pct=budget>0?Math.min(Math.round((depense/budget)*100),100):0;
  const ok=reste>=0;

  const card=div("alim-card");
  const hdr=div("alim-header");
  const title=el("span",{className:"alim-title"},"🛒 Alimentation");
  const addB=el("button",{className:"alim-add-btn"});addB.textContent="+ Courses";
  addB.onclick=()=>setState({modal:{type:"addCourse"}});
  hdr.append(title,addB);card.appendChild(hdr);

  // Jauge
  const jauge=div("alim-jauge");
  const chiffres=div("alim-chiffres");
  chiffres.innerHTML=`<span style="color:#F59E0B;font-weight:700">Dépensé : ${fmt(depense)}</span><span style="color:#94a3b8">Budget : ${fmt(budget)}</span>`;
  jauge.appendChild(chiffres);
  const pb=div("alim-pb");const pf=div("alim-pf");
  pf.style.cssText=`width:${pct}%;background:${pct>=100?"#EF4444":pct>=80?"#F59E0B":"#10B981"}`;
  pb.appendChild(pf);jauge.appendChild(pb);
  card.appendChild(jauge);

  // Reste
  const resteEl=div("alim-reste");resteEl.style.color=ok?"#10B981":"#EF4444";
  resteEl.textContent=ok?fmt(reste):"−"+fmt(Math.abs(reste));
  const resteLabel=div("alim-reste-label");
  resteLabel.textContent=ok?`reste à dépenser (${100-pct}%)`:`dépassement du budget !`;
  card.append(resteEl,resteLabel);

  // Historique courses
  // Calculer les jours disponibles du mois courant
  const curKey=STATE.curKey;
  const [curY,curM]=curKey.split("-").map(Number);
  const daysInMonth=new Date(curY,curM,0).getDate();
  const dayOptions=Array.from({length:daysInMonth},(_,i)=>{
    const d=String(i+1).padStart(2,"0");
    const m=String(curM).padStart(2,"0");

  if(courses.length>0){
    const hist=div("alim-courses");
    hist.appendChild(el("div",{className:"alim-courses-title"},`${courses.length} course${courses.length>1?"s":""} ce mois`));
    [...sortCourses(courses)].forEach(c=>{
      const row=div("alim-course-row");
      row.style.flexDirection="column";row.style.alignItems="stretch";row.style.gap="0";
      row.onclick=e=>e.stopPropagation(); // bloquer toute remontée depuis la ligne

      // Ligne principale
      const mainLine=div("");mainLine.style.cssText="display:flex;align-items:center;justify-content:space-between;padding:4px 0";

      // Date cliquable
      const dateBtn=el("button",{type:"button"});
      dateBtn.style.cssText="background:#1e3a5f;border:none;color:#60a5fa;font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px;cursor:pointer;flex-shrink:0";
      dateBtn.textContent=c.date;
      dateBtn.title="Modifier la date";

      const lbl=el("span",{className:"alim-course-label"});lbl.textContent=c.label;
      const mnt=el("span",{className:"alim-course-mnt"});mnt.textContent=fmt(c.montant);
      const del=el("button",{type:"button",className:"alim-course-del"});del.textContent="✕";
      del.onclick=e=>{e.stopPropagation();delCourse(c.id);};
      mainLine.append(dateBtn,lbl,mnt,del);
      row.appendChild(mainLine);

      // Panneau édition date (caché par défaut)
      const editPanel=div("");
      editPanel.style.cssText=`display:${STATE.openCourseId===c.id?"flex":"none"};background:#0f172a;border-radius:8px;padding:10px;margin-bottom:6px;gap:8px;flex-direction:column`;
      editPanel.onclick=e=>e.stopPropagation();

      // Sélecteur de jour
      const dateRow=div("");dateRow.style.cssText="display:flex;align-items:center;gap:8px";
      const dateLbl=el("span",{style:"color:#64748b;font-size:12px;flex-shrink:0"});dateLbl.textContent="Jour :";
      const dateSel=el("select",{});
      dateSel.style.cssText="flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#f1f5f9;font-size:14px";
      dateSel.onclick=e=>e.stopPropagation();
      dayOptions.forEach(d=>{
        const o=el("option",{value:d});o.textContent=d;
        if(d===c.date)o.selected=true;
        dateSel.appendChild(o);
      });
      dateRow.append(dateLbl,dateSel);

      // Champ montant éditable
      const mntRow=div("");mntRow.style.cssText="display:flex;align-items:center;gap:8px";
      const mntLbl=el("span",{style:"color:#64748b;font-size:12px;flex-shrink:0"});mntLbl.textContent="Montant :";
      const mntInp=el("input",{type:"number",step:"0.01",value:c.montant});
      mntInp.style.cssText="flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#f1f5f9;font-size:14px";
      mntInp.onclick=e=>e.stopPropagation();
      mntRow.append(mntLbl,mntInp);

      // Boutons valider / annuler
      const editBtns=div("");editBtns.style.cssText="display:flex;gap:8px";
      const saveB=el("button",{type:"button"});saveB.textContent="✓ Valider";
      saveB.style.cssText="flex:1;background:#3B82F6;border:none;color:#fff;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
      saveB.onclick=e=>{
        e.stopPropagation();
        STATE.openCourseId=null;
        updateCourse(c.id,{date:dateSel.value,montant:parseFloat(mntInp.value)||c.montant});
        editPanel.style.display="none";
      };
      const cancelB=el("button",{type:"button"});cancelB.textContent="Annuler";
      cancelB.style.cssText="flex:1;background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
      cancelB.onclick=e=>{e.stopPropagation();STATE.openCourseId=null;editPanel.style.display="none";};
      editBtns.append(saveB,cancelB);

      editPanel.append(dateRow,mntRow,editBtns);
      row.appendChild(editPanel);

      // Toggle panneau au clic sur la date
      dateBtn.onclick=e=>{
        e.stopPropagation();
        const isOpen=STATE.openCourseId===c.id;
        STATE.openCourseId=isOpen?null:c.id;
        editPanel.style.display=isOpen?"none":"flex";
      };

      hist.appendChild(row);
    });
    card.appendChild(hist);
  } else {
    const empty=el("p",{style:"color:#475569;font-size:12px;text-align:center;padding:8px 0"});
    empty.textContent="Aucune course enregistrée ce mois";
    card.appendChild(empty);
  }
  return card;
}

  const w=div("");w.style.cssText="display:flex;gap:8px;align-items:center";

  const b=el("button",{className:"eBtn"});b.textContent="✏️";b.onclick=onClick;
  w.append(sp,b);return w;

// DEPENSES
function renderDepenses(data){
  const filtre=STATE.filtre;const cats=["toutes",...getCats().slice().sort((a,b)=>a.localeCompare(b,"fr"))];
  const list=(filtre==="toutes"?data.depenses:data.depenses.filter(d=>d.categorie===filtre))
    .slice().sort((a,b)=>{
      const catCmp=a.categorie.localeCompare(b.categorie,"fr");
      if(catCmp!==0)return catCmp;
      return a.type.localeCompare(b.type,"fr");
    });
  const nb=data.depenses.filter(d=>d.paye).length;
  const pct=data.depenses.length?Math.round((nb/data.depenses.length)*100):0;
  const col=div("col");
  const mc=div("card");mc.style.padding="10px 14px";
  const ml=div("");ml.style.cssText="display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:6px";
  ml.innerHTML=`<span>${nb}/${data.depenses.length} réglées</span><span>${pct}%</span>`;
  const mpb=div("pb");const mpf=div("pf");mpf.style.width=pct+"%";mpb.appendChild(mpf);
  mc.append(ml,mpb);col.appendChild(mc);
  const fs=div("fscr");cats.forEach(c=>{const b=el("button",{className:"fbtn"+(filtre===c?" on":"")});b.textContent=c;b.onclick=()=>setState({filtre:c});fs.appendChild(b);});col.appendChild(fs);
  list.forEach(d=>{
    const row=div("drow");row.style.opacity=d.paye?"0.55":"1";
    const chk=el("button",{className:"chk"+(d.paye?" done":"")});chk.textContent=d.paye?"✓":"";chk.onclick=()=>togglePaye(d.id);
    const info=div("");
    const name=el("div",{style:`color:${d.paye?"#64748b":"#f1f5f9"};font-weight:600;font-size:14px;text-decoration:${d.paye?"line-through":"none"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis`});
    name.textContent=d.type;
    const pill=el("span",{className:"pill",style:`background:${getCatColor(d.categorie)}`});pill.textContent=d.categorie;
    info.append(name,pill);
    const mnt=el("span",{style:`color:${d.paye?"#64748b":"#f1f5f9"};font-weight:700;font-size:14px;margin-right:8px`});mnt.textContent=fmt(d.montant);
    const eb=el("button",{className:"eBtn"});eb.textContent="✏️";eb.onclick=()=>setState({modal:{type:"edit",itemType:"depense",item:{...d}}});
    row.append(chk,info,mnt,eb);col.appendChild(row);
  });
  const ab=el("button",{className:"add-btn"});ab.textContent="+ Ajouter une dépense";
  ab.onclick=()=>setState({modal:{type:"add",itemType:"depense",item:{type:"",montant:"",categorie:"autre"}}});
  col.appendChild(ab);

  // Bouton gérer les catégories
  const catBtn=el("button",{});
  catBtn.textContent="🗂 Gérer les catégories";
  catBtn.style.cssText="width:100%;background:transparent;border:1px solid #334155;color:#64748b;border-radius:10px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;text-align:center";
  catBtn.onclick=()=>setState({modal:{type:"manageCats",prevModal:null}});
  col.appendChild(catBtn);

  return col;
}

// HISTORIQUE
function renderHistorique(months,allKeys){
  const col=div("col");
  if(allKeys.length<2){const c=div("card");c.innerHTML=`<p style="color:#64748b;text-align:center;padding:24px 0">📅 L'historique apparaîtra dès que vous aurez 2 mois enregistrés.</p>`;col.appendChild(c);return col;}
  const rows=allKeys.map(k=>{
    const m=months[k];
    const sal=m.salaires.reduce((a,x)=>a+(+x.montant||0),0);
    const dep=m.depenses.reduce((a,x)=>a+(+x.montant||0),0);
    const eco=m.economies.reduce((a,x)=>a+(+x.montant||0),0);
    const courses=(m.courses||[]).reduce((a,x)=>a+(+x.montant||0),0);
    const budgetAlim=m.depenses.find(d=>d.type==="Alimentation")?.montant||800;
    const pp=dep>0?Math.round((m.depenses.filter(d=>d.paye).reduce((a,x)=>a+(+x.montant||0),0)/dep)*100):0;
    return{k,label:keyLabel(k),sal,dep,eco,solde:sal-dep-eco,pp,courses,budgetAlim};
  });
  const maxDep=Math.max(...rows.map(r=>r.dep),1);
  const tc=div("card");tc.appendChild(el("h3",{className:"ct"},"Récapitulatif mensuel"));
  const t=el("table",{style:"width:100%;border-collapse:collapse;font-size:12px"});
  t.innerHTML=`<thead><tr style="color:#64748b"><th style="text-align:left;padding:4px 6px">Mois</th><th style="text-align:right;padding:4px 6px">Salaires</th><th style="text-align:right;padding:4px 6px">Dépenses</th><th style="text-align:right;padding:4px 6px">Solde</th></tr></thead>`;
  const tb=el("tbody",{});
  rows.forEach(r=>{const tr=el("tr",{style:"border-top:1px solid #1e3a5f"});tr.innerHTML=`<td style="padding:7px 6px;color:#cbd5e1;font-weight:600">${r.label}</td><td style="padding:7px 6px;text-align:right;color:#10B981;font-weight:600">${fmt(r.sal)}</td><td style="padding:7px 6px;text-align:right;color:#EF4444;font-weight:600">${fmt(r.dep)}</td><td style="padding:7px 6px;text-align:right;font-weight:700;color:${r.solde>=0?"#3B82F6":"#EF4444"}">${fmt(r.solde)}</td>`;tb.appendChild(tr);});
  t.appendChild(tb);tc.appendChild(t);col.appendChild(tc);

  // Alimentation historique
  const ac=div("card");ac.appendChild(el("h3",{className:"ct"},"🛒 Alimentation par mois"));
  rows.forEach(r=>{
    const pct=r.budgetAlim>0?Math.min(Math.round((r.courses/r.budgetAlim)*100),100):0;
    const ok=r.courses<=r.budgetAlim;
    const d=div("");d.style.marginBottom="12px";
    d.innerHTML=`
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span style="color:#94a3b8;font-weight:600">${r.label}</span>
        <span style="color:${ok?"#10B981":"#EF4444"};font-weight:700">${fmt(r.courses)} / ${fmt(r.budgetAlim)}</span>
      </div>
      <div style="background:#1e3a5f;border-radius:6px;height:8px;overflow:hidden">
        <div style="background:${pct>=100?"#EF4444":pct>=80?"#F59E0B":"#10B981"};height:100%;border-radius:6px;width:${pct}%"></div>
      </div>
      <div style="font-size:11px;color:#475569;margin-top:2px">${ok?"Reste : "+fmt(r.budgetAlim-r.courses):"Dépassement : "+fmt(r.courses-r.budgetAlim)}</div>`;
    ac.appendChild(d);
  });col.appendChild(ac);

  const bc=div("card");bc.appendChild(el("h3",{className:"ct"},"Évolution des dépenses"));
  rows.forEach(r=>{const d=div("");d.style.marginBottom="12px";d.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#94a3b8;font-weight:600">${r.label}</span><span style="color:#EF4444;font-weight:700">${fmt(r.dep)}</span></div><div style="background:#1e3a5f;border-radius:6px;height:8px;overflow:hidden"><div style="background:linear-gradient(90deg,#EF4444,#F59E0B);height:100%;border-radius:6px;width:${Math.round((r.dep/maxDep)*100)}%"></div></div><div style="font-size:11px;color:#475569;margin-top:2px">Réglé : ${r.pp}%</div>`;bc.appendChild(d);});col.appendChild(bc);

  const ecc=div("card");ecc.appendChild(el("h3",{className:"ct"},"Épargne cumulée"));
  let cum=0;[...rows].reverse().forEach(r=>{cum+=r.eco;const li=div("li");li.innerHTML=`<span style="color:#94a3b8;font-size:13px">${r.label}</span><div style="text-align:right"><div style="color:#F59E0B;font-weight:700;font-size:13px">${fmt(r.eco)}/mois</div><div style="color:#64748b;font-size:11px">Cumulé : ${fmt(cum)}</div></div>`;ecc.appendChild(li);});col.appendChild(ecc);
  return col;
}

// MODALS
function renderModal(modal,data,months,allKeys){
  const ol=div("overlay");ol.onclick=()=>setState({modal:null});
  const m=div("modal");m.onclick=e=>e.stopPropagation();

  // ── Ajouter une course ──
  if(modal.type==="addCourse"){
    // Persister les valeurs du formulaire dans STATE
    if(!STATE.courseForm)STATE.courseForm={commerce:getCommerces()[0]||"Courses",montant:""};
    const cf=STATE.courseForm;
    const courses=data.courses||[];
    const budget=data.depenses.find(d=>d.type==="Alimentation")?.montant||800;
    const dejaDepense=courses.reduce((a,c)=>a+(+c.montant||0),0);
    const resteAvant=budget-dejaDepense;

    m.appendChild(el("h2",{className:"mt"},"🛒 Ajouter des courses"));

    // Info budget
    const infoHaut=div("");infoHaut.style.cssText="background:#0f172a;border-radius:8px;padding:10px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center";
    infoHaut.innerHTML=`<div><div style="font-size:11px;color:#64748b">Budget</div><div style="font-size:15px;font-weight:800;color:#F59E0B">${fmt(budget)}</div></div><div style="text-align:center"><div style="font-size:11px;color:#64748b">Dépensé</div><div style="font-size:15px;font-weight:800;color:#EF4444">${fmt(dejaDepense)}</div></div><div style="text-align:right"><div style="font-size:11px;color:#64748b">Reste</div><div style="font-size:15px;font-weight:800;color:${resteAvant>=0?"#10B981":"#EF4444"}">${fmt(resteAvant)}</div></div>`;
    m.appendChild(infoHaut);

    // ── Sélecteur de Commerces ──
    m.appendChild(el("label",{},"Commerces"));
    const commerceWrap=div("");commerceWrap.style.cssText="display:flex;flex-direction:column;gap:8px;margin-top:4px";

    // Liste des commerces en boutons
    const commerceList=div("");commerceList.style.cssText="display:flex;flex-wrap:wrap;gap:6px";
    function renderCommerces(){
      commerceList.innerHTML="";
      getCommerces().forEach(c=>{
        const btn=div("");
        btn.style.cssText=`padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid ${c===cf.commerce?"#3B82F6":"#334155"};background:${c===cf.commerce?"#1d4ed8":"transparent"};color:${c===cf.commerce?"#fff":"#94a3b8"};transition:all .15s;display:flex;align-items:center;gap:4px`;
        const nameSp=el("span",{});nameSp.textContent=c;
        btn.appendChild(nameSp);
        btn.onclick=e=>{e.stopPropagation();cf.commerce=c;renderCommerces();};
        // ✕ sur TOUS les commerces - toujours visible sur mobile
        const del=el("span",{});del.textContent=" ✕";
        del.style.cssText=`font-size:10px;opacity:${c===cf.commerce?"0.9":"0.35"};cursor:pointer;margin-left:2px`;
        del.onclick=e=>{
          e.stopPropagation();
          // Confirmation inline (pas de confirm() qui est bloqué sur mobile PWA)
          const existing=commerceList.querySelector(".del-confirm-wrap");
          if(existing)existing.remove();
          const confirmWrap=div("del-confirm-wrap");
          confirmWrap.style.cssText="width:100%;background:#1e3a5f;border:1px solid #EF4444;border-radius:8px;padding:8px 10px;margin-top:4px;display:flex;align-items:center;justify-content:space-between;gap:8px";
          confirmWrap.onclick=e=>e.stopPropagation();
          const msg=el("span",{style:"color:#fca5a5;font-size:12px;font-weight:600"});
          msg.textContent=`Supprimer "${c}" ?`;
          const oui=el("button",{type:"button"});oui.textContent="✓ Oui";
          oui.style.cssText="background:#EF4444;border:none;color:#fff;border-radius:6px;padding:4px 10px;font-weight:700;font-size:12px;cursor:pointer";
          oui.onclick=e=>{
            e.stopPropagation();
            delCommerce(c);
            if(cf.commerce===c)cf.commerce=getCommerces()[0]||"Courses";
            renderCommerces();
          };
          const non=el("button",{type:"button"});non.textContent="Annuler";
          non.style.cssText="background:#334155;border:none;color:#94a3b8;border-radius:6px;padding:4px 10px;font-weight:700;font-size:12px;cursor:pointer";
          non.onclick=e=>{e.stopPropagation();confirmWrap.remove();};
          confirmWrap.append(msg,oui,non);
          commerceList.appendChild(confirmWrap);
        };
        btn.appendChild(del);
        commerceList.appendChild(btn);
      });
    }
    renderCommerces();
    commerceWrap.appendChild(commerceList);

    // Zone ajout nouveau commerce
    const newCommerceWrap=div("");newCommerceWrap.style.cssText="display:flex;gap:8px;margin-top:4px";
    const newCommerceInp=el("input",{type:"text",placeholder:"Nouveau commerce…"});
    newCommerceInp.style.cssText="flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#f1f5f9;font-size:14px";
    newCommerceInp.onclick=e=>e.stopPropagation();
    const newCommerceBtn=el("button",{type:"button"});newCommerceBtn.textContent="+ Ajouter";
    newCommerceBtn.style.cssText="background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap";
    newCommerceBtn.onclick=e=>{
      e.stopPropagation();
      const nom=newCommerceInp.value.trim();
      if(!nom)return;
      if(addCommerce(nom)){
        cf.commerce=nom;
        renderCommerces();
        newCommerceInp.value="";
        notify("✓ Commerce ajouté !");
      } else {
        notify("Ce commerce existe déjà");
      }
    };
    newCommerceWrap.append(newCommerceInp,newCommerceBtn);
    commerceWrap.appendChild(newCommerceWrap);
    m.appendChild(commerceWrap);

    // Montant
    m.appendChild(el("label",{style:"margin-top:12px"},"Montant (€)"));
    const mi=el("input",{type:"number",step:"0.01",value:cf.montant||"",placeholder:"0.00"});mi.style.marginTop="4px";

    // Reste après
    const resteApresBox=div("");resteApresBox.style.cssText="background:#0f172a;border-radius:8px;padding:12px;margin-top:12px;text-align:center";
    const apresInit=resteAvant-(parseFloat(cf.montant)||0);
    const okInit=apresInit>=0;
    resteApresBox.innerHTML=`<div style="font-size:11px;color:#64748b;margin-bottom:4px">Reste après cette course</div><div style="font-size:22px;font-weight:900;color:${okInit?"#10B981":"#EF4444"}">${okInit?fmt(apresInit):"−"+fmt(Math.abs(apresInit))}</div>`;
    mi.oninput=e=>{
      cf.montant=e.target.value;
      const apres=resteAvant-(parseFloat(cf.montant)||0);
      const ok=apres>=0;
      resteApresBox.innerHTML=`<div style="font-size:11px;color:#64748b;margin-bottom:4px">Reste après cette course</div><div style="font-size:22px;font-weight:900;color:${ok?"#10B981":"#EF4444"}">${ok?fmt(apres):"−"+fmt(Math.abs(apres))}</div>${!ok?'<div style="font-size:11px;color:#EF4444;margin-top:4px">⚠ Budget dépassé !</div>':""}`;
    };
    m.appendChild(mi);
    m.appendChild(resteApresBox);

    const btns=div("mbtns");
    const sv=el("button",{className:"b-save"});sv.textContent="✓ Ajouter";
    sv.onclick=e=>{e.stopPropagation();if(cf.montant){addCourse(cf.commerce,cf.montant);STATE.courseForm=null;}};
    const ca=el("button",{className:"b-can"});ca.textContent="Annuler";ca.onclick=()=>{STATE.courseForm=null;setState({modal:null});};
    btns.append(sv,ca);m.appendChild(btns);
  }

  // ── Changer PIN ──
  else if(modal.type==="changePin"){
    const steps=["","Entrez votre code actuel","Entrez le nouveau code","Confirmez le nouveau code"];
    m.appendChild(el("h2",{className:"mt"},"🔑 Changer le code PIN"));
    const step=el("p",{id:"change-pin-step",style:"font-size:13px;color:#94a3b8;margin-bottom:12px"});
    step.textContent=steps[STATE.changePinStep]||"";m.appendChild(step);
    const dots=div("pin-dots");dots.id="change-pin-dots";dots.style.cssText="justify-content:center;margin-bottom:20px";
    for(let i=0;i<4;i++){const d=div("pin-dot");if(STATE.changePinInput.length>i)d.classList.add("filled");dots.appendChild(d);}
    m.appendChild(dots);
    const err=el("p",{id:"change-pin-err",style:"color:#EF4444;font-size:13px;font-weight:700;min-height:20px;margin-bottom:12px;text-align:center"});
    err.textContent=STATE.changePinError||"";m.appendChild(err);
    const grid=div("pin-grid");grid.style.margin="0 auto";
    ["1","2","3","4","5","6","7","8","9","","0","⌫"].forEach(d=>{
      if(d===""){grid.appendChild(div("pin-btn empty"));return;}
      const b=div("pin-btn"+(d==="⌫"?" del":""));b.textContent=d;b.onclick=e=>{e.stopPropagation();d==="⌫"?handleChangePinDel():handleChangePinDigit(d);};grid.appendChild(b);
    });
    m.appendChild(grid);
    const ca=el("button",{className:"b-can",style:"margin-top:20px;width:100%"});ca.textContent="Annuler";
    ca.onclick=()=>setState({modal:null,changePinStep:0,changePinInput:""});m.appendChild(ca);
  }

  // ── Edit / Add ──
  else if(modal.type==="edit"||modal.type==="add"){
    // On stocke l'item dans STATE.modalItem pour survivre aux re-renders (sync 15s)
    if(!STATE.modalItem||STATE.modalItem._modalId!==modal._modalId){
      STATE.modalItem={...modal.item, _modalId:modal._modalId||uid()};
      modal._modalId=STATE.modalItem._modalId;
    }
    const item=STATE.modalItem;
    const isEdit=modal.type==="edit";
    const titles={depense:isEdit?"Modifier la dépense":"Nouvelle dépense",salaire:"Modifier le salaire",economie:isEdit?"Modifier l'épargne":"Nouvelle ligne d'épargne",poche:"Argent de poche"};
    m.appendChild(el("h2",{className:"mt"},titles[modal.itemType]||"Modifier"));
    const itemType=modal.itemType;
    if(itemType==="salaire"||itemType==="poche"){const p=el("p",{style:"color:#94a3b8;font-size:14px;margin-bottom:4px"});p.textContent=item.prenom;m.appendChild(p);}
    if(itemType==="depense"||itemType==="economie"){
      m.appendChild(el("label",{},"Libellé"));
      const libelleInp=el("input",{type:"text",value:item.type||"",placeholder:"ex: Cinéma"});
      libelleInp.oninput=e=>{item.type=e.target.value;};
      m.appendChild(libelleInp);
    }
    m.appendChild(el("label",{},"Montant (€)"));
    const montantInp=el("input",{type:"number",step:"0.01",value:item.montant||""});
    montantInp.oninput=e=>{item.montant=e.target.value;};
    m.appendChild(montantInp);
    if(itemType==="depense"){
      m.appendChild(el("label",{},"Catégories"));
      const catWrap=div("");catWrap.style.cssText="display:flex;flex-direction:column;gap:8px;margin-top:4px";
      catWrap.onclick=e=>e.stopPropagation();

      // Boutons catégories
      const catGrid=div("");catGrid.style.cssText="display:flex;flex-wrap:wrap;gap:6px";
      function renderCatButtons(){
        catGrid.innerHTML="";
        getCats().slice().sort((a,b)=>a.localeCompare(b,"fr")).forEach(c=>{
          const btn=div("");
          const selected=c===(item.categorie||"autre");
          btn.style.cssText=`padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid ${selected?"#3B82F6":"#334155"};background:${selected?"#1d4ed8":"transparent"};color:${selected?"#fff":"#94a3b8"};display:flex;align-items:center;gap:4px;transition:all .15s`;
          const dot=el("span",{});dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${getCatColor(c)};flex-shrink:0`;
          const lbl=el("span",{});lbl.textContent=c;
          btn.append(dot,lbl);
          btn.onclick=e=>{e.stopPropagation();item.categorie=c;renderCatButtons();};
          catGrid.appendChild(btn);
        });
      }
      renderCatButtons();
      catWrap.appendChild(catGrid);

      // Bouton Gérer uniquement
      const manageBtn=el("button",{type:"button"});manageBtn.textContent="🗂 Gérer les catégories";
      manageBtn.style.cssText="width:100%;background:transparent;border:1px solid #334155;color:#64748b;border-radius:8px;padding:8px;font-weight:700;font-size:12px;cursor:pointer;margin-top:2px";
      manageBtn.onclick=e=>{
        e.stopPropagation();
        // Mémoriser la catégorie choisie et rouvrir ce modal après
        const prev=STATE.modal;
        setState({modal:{type:"manageCats",prevModal:prev,onReturn:()=>renderCatButtons()}});
      };
      catWrap.appendChild(manageBtn);
      m.appendChild(catWrap);
    }
    const btns=div("mbtns");
    const sv=el("button",{className:"b-save"});sv.textContent="Sauvegarder";
    sv.onclick=()=>{STATE.modalItem=null;isEdit?saveItem(itemType,item):addItem(itemType,item);};
    btns.appendChild(sv);
    if(isEdit&&(itemType==="depense"||itemType==="economie")){const d=el("button",{className:"b-del"});d.textContent="🗑";d.onclick=()=>{STATE.modalItem=null;delItem(itemType,item.id);};btns.appendChild(d);}
    const ca=el("button",{className:"b-can"});ca.textContent="Annuler";ca.onclick=()=>{STATE.modalItem=null;setState({modal:null});};btns.appendChild(ca);m.appendChild(btns);
  }

  // ── Nouveau mois ──
  else if(modal.type==="newMonth"){
    const now=new Date();let year=now.getFullYear(),month=now.getMonth()+1,copy="";
    m.appendChild(el("h2",{className:"mt"},"Nouveau mois"));
    m.appendChild(el("label",{},"Année"));m.appendChild(sel(String(year),["2024","2025","2026","2027"],v=>{year=+v;}));
    m.appendChild(el("label",{},"Mois"));

    MOIS.forEach((nm,i)=>{const o=el("option",{value:String(i+1)});o.textContent=nm;if(i+1===month)o.selected=true;ms.appendChild(o);});
    ms.onchange=e=>{month=+e.target.value;};m.appendChild(ms);

    const ca=el("button",{className:"b-can"});ca.textContent="Annuler";ca.onclick=()=>setState({modal:null});
    btns.append(go,ca);m.appendChild(btns);
  }

  // ── Gérer / supprimer catégories ──
  else if(modal.type==="manageCats"){
    const PALETTE=["#3B82F6","#10B981","#8B5CF6","#EF4444","#F59E0B","#06B6D4","#EC4899","#84CC16","#f97316","#6366f1","#14b8a6","#d946ef","#0ea5e9","#a855f7","#eab308","#78716c","#e11d48","#0d9488"];
    m.appendChild(el("h2",{className:"mt"},"🗂 Gérer les catégories"));

    // ── Formulaire création ──
    const createWrap=div("");createWrap.style.cssText="background:#0f172a;border-radius:10px;padding:12px;margin-bottom:16px;border:1px solid #334155";
    createWrap.onclick=e=>e.stopPropagation();
    const createTitle=el("p",{style:"color:#94a3b8;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px"});
    createTitle.textContent="✚ Nouvelle catégorie";
    const createInp=el("input",{type:"text",placeholder:"Nom…"});
    createInp.style.cssText="width:100%;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#f1f5f9;font-size:14px;box-sizing:border-box;margin-bottom:10px";
    createInp.onclick=e=>e.stopPropagation();
    // Palette couleur
    let cSelectedColor=PALETTE[0];
    // Aperçu
    const cBottom=div("");cBottom.style.cssText="display:flex;gap:8px;align-items:center";
    const cPreview=div("");cPreview.style.cssText=`background:${cSelectedColor};color:#fff;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700`;
    cPreview.textContent="aperçu";
    createInp.oninput=e=>{cPreview.textContent=e.target.value||"aperçu";};
    const cColorLabel=el("p",{style:"color:#94a3b8;font-size:12px;font-weight:700;margin-bottom:6px"});cColorLabel.textContent="Couleur";
    const cColorGrid=div("");cColorGrid.style.cssText="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px";
    PALETTE.forEach(color=>{
      const sw=div("");sw.style.cssText=`width:24px;height:24px;border-radius:50%;background:${color};cursor:pointer;border:${color===cSelectedColor?"2px solid #fff":"2px solid transparent"};flex-shrink:0`;
      sw.onclick=e=>{
        e.stopPropagation();
        cSelectedColor=color;
        cColorGrid.querySelectorAll("div").forEach(s=>s.style.border="2px solid transparent");
        sw.style.border="2px solid #fff";
        cPreview.style.background=color;
      };
      cColorGrid.appendChild(sw);
    });
    const cErr=el("p",{style:"color:#EF4444;font-size:11px;min-height:14px;margin-bottom:4px"});
    const cBtn=el("button",{type:"button"});cBtn.textContent="✓ Créer";
    cBtn.style.cssText="background:#3B82F6;border:none;color:#fff;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap";
    cBtn.onclick=e=>{
      e.stopPropagation();
      const nom=createInp.value.trim().toLowerCase();
      if(!nom){cErr.textContent="Entrez un nom";return;}
      if(getCats().includes(nom)){cErr.textContent="Cette catégorie existe déjà";return;}
      addCustomCat(nom,cSelectedColor);
      createInp.value="";cPreview.textContent="aperçu";cErr.textContent="";
      notify("✓ Catégorie créée !");
      renderAllCats();
    };
    cBottom.append(cPreview,cBtn);
    createWrap.append(createTitle,createInp,cColorLabel,cColorGrid,cErr,cBottom);
    m.appendChild(createWrap);

    const listWrap=div("");listWrap.id="cat-manage-list";

    function renderAllCats(){
      listWrap.innerHTML="";
      const allCats=getCats().slice().sort((a,b)=>a.localeCompare(b,"fr"));
      allCats.forEach(c=>{
        const isNative=CATEGORIES_BASE.includes(c);
        const row=div("");row.style.cssText="background:#0f172a;border-radius:8px;margin-bottom:8px;overflow:hidden";

        // ── Ligne principale ──
        const main=div("");main.style.cssText="display:flex;align-items:center;justify-content:space-between;padding:8px 10px";
        const left=div("");left.style.cssText="display:flex;align-items:center;gap:8px;flex:1;min-width:0";
        const dot=div("");dot.style.cssText=`width:10px;height:10px;border-radius:50%;background:${getCatColor(c)};flex-shrink:0`;
        const lbl=el("span",{style:"color:#cbd5e1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"});lbl.textContent=c;
        let nb=0;Object.values(STATE.months).forEach(mo=>mo.depenses.forEach(d=>{if(d.categorie===c)nb++;}));
        const count=el("span",{style:"color:#64748b;font-size:11px;margin-left:4px;flex-shrink:0"});
        count.textContent=nb>0?`(${nb})` :"";
        left.append(dot,lbl,count);

        const rowBtns=div("");rowBtns.style.cssText="display:flex;gap:6px;flex-shrink:0";

        // 🎨 Couleur
        const colorB=el("button",{type:"button"});colorB.textContent="🎨";
        colorB.style.cssText="background:#334155;border:none;color:#fff;border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer";
        colorB.onclick=e=>{
          e.stopPropagation();
          const existing=row.querySelector(".color-picker-inline");
          if(existing){existing.remove();return;}
          // fermer autres pickers
          listWrap.querySelectorAll(".color-picker-inline").forEach(x=>x.remove());
          listWrap.querySelectorAll(".rename-wrap").forEach(x=>x.remove());
          const picker=div("color-picker-inline");picker.style.cssText="display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:#1e293b;border-top:1px solid #334155";
          PALETTE.forEach(color=>{
            const sw=div("");sw.style.cssText=`width:26px;height:26px;border-radius:50%;background:${color};cursor:pointer;border:${getCatColor(c)===color?"2px solid #fff":"2px solid transparent"}`;
            sw.onclick=e=>{e.stopPropagation();saveCatCustomColor(c,color);dot.style.background=color;picker.remove();notify("✓ Couleur modifiée !");};
            picker.appendChild(sw);
          });
          row.appendChild(picker);
        };

        // ✏️ Renommer
        const renameB=el("button",{type:"button"});renameB.textContent="✏️";
        renameB.style.cssText="background:#334155;border:none;color:#fff;border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer";
        renameB.onclick=e=>{
          e.stopPropagation();
          const existing=row.querySelector(".rename-wrap");
          if(existing){existing.remove();return;}
          listWrap.querySelectorAll(".rename-wrap").forEach(x=>x.remove());
          listWrap.querySelectorAll(".color-picker-inline").forEach(x=>x.remove());
          const rw=div("rename-wrap");rw.style.cssText="display:flex;gap:8px;padding:8px 10px;background:#1e293b;border-top:1px solid #334155";
          rw.onclick=e=>e.stopPropagation();
          const ri=el("input",{type:"text",value:c,placeholder:"Nouveau nom…"});
          ri.style.cssText="flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#f1f5f9;font-size:14px";
          ri.onclick=e=>e.stopPropagation();
          const rb=el("button",{type:"button"});rb.textContent="✓";
          rb.style.cssText="background:#3B82F6;border:none;color:#fff;border-radius:8px;padding:6px 12px;font-weight:700;font-size:14px;cursor:pointer";
          rb.onclick=e=>{
            e.stopPropagation();
            const newName=ri.value.trim().toLowerCase();
            if(!newName||newName===c){rw.remove();return;}
            if(getCats().includes(newName)){notify("⚠ Ce nom existe déjà");return;}
            // Renommer dans getCats
            const cats=getCats().map(x=>x===c?newName:x);
            saveCats(cats);
            // Transférer la couleur
            const col=getCatCustomColors()[c];
            if(col)saveCatCustomColor(newName,col);
            delCatCustomColor(c);
            // Renommer dans toutes les dépenses
            Object.keys(STATE.months).forEach(k=>{
              STATE.months[k].depenses=STATE.months[k].depenses.map(d=>d.categorie===c?{...d,categorie:newName}:d);
            });
            DB.save(STATE.months);
            notify("✓ Catégorie renommée !");
            renderAllCats();
          };
          const rc=el("button",{type:"button"});rc.textContent="✕";
          rc.style.cssText="background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer";
          rc.onclick=e=>{e.stopPropagation();rw.remove();};
          rw.append(ri,rb,rc);row.appendChild(rw);
          setTimeout(()=>ri.focus(),50);
        };

        // 🗑 Supprimer
        const delB=el("button",{type:"button"});delB.textContent="🗑";
        delB.style.cssText="background:#7f1d1d;border:none;color:#fca5a5;border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer";
        delB.onclick=e=>{
          e.stopPropagation();
          listWrap.querySelectorAll(".del-confirm").forEach(x=>x.remove());
          listWrap.querySelectorAll(".rename-wrap,.color-picker-inline").forEach(x=>x.remove());
          const cf=div("del-confirm");cf.style.cssText="padding:8px 10px;background:#1e293b;border-top:1px solid #EF4444";
          cf.onclick=e=>e.stopPropagation();
          const msg=el("p",{style:"color:#fca5a5;font-size:12px;margin-bottom:8px"});
          msg.innerHTML=nb>0
            ?`⚠ <strong>${nb} dépense${nb>1?"s":""}</strong> → réaffectée${nb>1?"s":""} à <strong>"autre"</strong>`
            :`Supprimer <strong>"${c}"</strong> ?`;
          const cfBtns=div("");cfBtns.style.cssText="display:flex;gap:8px";
          const yes=el("button",{type:"button"});yes.textContent="✓ Confirmer";
          yes.style.cssText="flex:1;background:#EF4444;border:none;color:#fff;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
          yes.onclick=e=>{
            e.stopPropagation();
            delCatAndReassign(c);
            renderAllCats();
          };
          const no=el("button",{type:"button"});no.textContent="Annuler";
          no.style.cssText="flex:1;background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
          no.onclick=e=>{e.stopPropagation();cf.remove();};
          cfBtns.append(yes,no);cf.append(msg,cfBtns);row.appendChild(cf);
        };

        rowBtns.append(colorB,renameB,delB);
        main.append(left,rowBtns);row.appendChild(main);
        listWrap.appendChild(row);
      });

      if(getCats().length===0){
        const p=el("p",{style:"color:#475569;font-size:13px;padding:8px 0"});
        p.textContent="Aucune catégorie";listWrap.appendChild(p);
      }
    }
    renderAllCats();
    m.appendChild(listWrap);

    const ca=el("button",{className:"b-can",style:"margin-top:20px;width:100%"});ca.textContent="← Retour";
    ca.onclick=()=>setState({modal:modal.prevModal||null});
    m.appendChild(ca);
  }
  ol.appendChild(m);return ol;
}

// START
// Forcer envoi vers GAS si la page est fermée avant le timer
window.addEventListener("beforeunload",()=>{
  if(_pendingSave) DB.sendSync(_pendingSave);
});
(async()=>{
  // Déchiffrer l'URL Google Apps Script
  GAS_URL = await _getGasUrl();
  await migratePin();
  if(!hasPin()){
    setState({screen:"setup",setupStep:0,setupInput:"",setupError:""});
  } else if(isAuthed()){
    setState({screen:"app"});init();
  } else {
    setState({screen:"pin"});
  }
})();
</script>
