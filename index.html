<script>
// Clé de chiffrement données : dérivée du salt PIN via PBKDF2
// → unique par appareil, non stockée en dur dans le code
// Clé de chiffrement des données — passphrase + salt FIXES dans le code
// → clé IDENTIQUE sur tous les appareils et après vidage du cache
// → les données Google Sheets restent toujours récupérables
const _DATA_PASS="BudgetFamilial#Gilles&Murielle#2026";
const _DATA_SALT_FIXED="YnVkZ2V0ZmFtaWxpYWwyMDI2"; // base64 de "budgetfamilial2026"
let _dataKey=null;
async function getDataKey(){
  if(_dataKey)return _dataKey;
  const baseKey=await crypto.subtle.importKey(
    "raw",new TextEncoder().encode(_DATA_PASS),{name:"PBKDF2"},false,["deriveKey"]
  );
  _dataKey=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:Uint8Array.from(atob(_DATA_SALT_FIXED),c=>c.charCodeAt(0)),iterations:100000,hash:"SHA-256"},
    baseKey,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]
  );
  return _dataKey;
}
async function encryptData(obj){
  const key=await getDataKey();
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const enc=await crypto.subtle.encrypt(
    {name:"AES-GCM",iv},key,
    new TextEncoder().encode(JSON.stringify(obj))
  );
  return JSON.stringify({
    iv:btoa(String.fromCharCode(...iv)),
    d:btoa(String.fromCharCode(...new Uint8Array(enc)))
  });
}
async function decryptData(str){
  if(!str||str.trim().length<2)return null;
  try{
    const parsed=JSON.parse(str);
    // Format chiffré : {iv, d}
    if(parsed&&parsed.iv&&parsed.d){
      try{
        const key=await getDataKey();
        const dec=await crypto.subtle.decrypt(
          {name:"AES-GCM",iv:Uint8Array.from(atob(parsed.iv),c=>c.charCodeAt(0))},
          key,new Uint8Array(Array.from(atob(parsed.d),c=>c.charCodeAt(0)))
        );
        return JSON.parse(new TextDecoder().decode(dec));
      }catch{
        // Déchiffrement échoué (ex: ancien salt) → les données sont perdues côté chiffré
        // mais on tente quand même de lire comme JSON brut au cas où
        return null;
      }
    }
    // Format JSON brut non chiffré (ancien format ou fallback)
    if(typeof parsed==="object"&&parsed!==null)return parsed;
    return null;
  }catch{return null;}
}

async function lsSet(key,val){
  try{
    const enc=await encryptData(val);
    localStorage.setItem(key,enc);
  }catch{
    try{localStorage.setItem(key,JSON.stringify(val));}catch{}
  }
}
async function lsGet(key){
  try{
    const v=localStorage.getItem(key);
    if(!v)return null;
    const dec=await decryptData(v);
    return dec;
  }catch{return null;}
}
// ── Catégories ───────────────────────────────────────────────────────────────
const CATS_KEY="bf-cats-v2"; // clé v2 pour repartir propre
function getCats(){
  try{
    const v=localStorage.getItem(CATS_KEY);
    if(v){const p=JSON.parse(v);if(Array.isArray(p)&&p.length>0)return p;}
  }catch{}
  // Migration depuis ancienne clé
  try{
    const old=localStorage.getItem("bf-cats");
    if(old){const p=JSON.parse(old);if(Array.isArray(p)&&p.length>0){localStorage.setItem(CATS_KEY,JSON.stringify(p));localStorage.removeItem("bf-cats");return p;}}
  }catch{}

function saveCats(cats,silent=false){

const CAT_COLORS={logement:"#3B82F6",assurances:"#10B981",abonnements:"#8B5CF6","crédits":"#EF4444","vie courante":"#F59E0B",transport:"#06B6D4",enfants:"#EC4899",animaux:"#84CC16",autre:"#9CA3AF"};

function getCatCustomColors(){

  try{const old=localStorage.getItem("bf-cat-colors");if(old){const p=JSON.parse(old);localStorage.setItem(CAT_COLORS_KEY,JSON.stringify(p));localStorage.removeItem("bf-cat-colors");return p;}}catch{}
  return{};
}
function saveCatCustomColor(cat,color){
  const cc=getCatCustomColors();cc[cat]=color;
  try{localStorage.setItem(CAT_COLORS_KEY,JSON.stringify(cc));}catch{}
}
function delCatCustomColor(cat){
  const cc=getCatCustomColors();delete cc[cat];
  try{localStorage.setItem(CAT_COLORS_KEY,JSON.stringify(cc));}catch{}
}
function getCatColor(cat){const custom=getCatCustomColors()[cat];if(custom)return custom;return CAT_COLORS[cat]||(CAT_COLORS_EXTRA[getCats().indexOf(cat)%CAT_COLORS_EXTRA.length]||"#9CA3AF");}
function addCustomCat(nom,color){
  const n=nom.trim().toLowerCase();if(!n)return false;
  const cats=getCats();if(cats.includes(n))return false;
  cats.push(n);saveCats(cats);
  if(color)saveCatCustomColor(n,color);
  return true;
}
function delCustomCat(nom){
  const cats=getCats().filter(c=>c!==nom);saveCats(cats);
  delCatCustomColor(nom);
}
function delCatAndReassign(nom){
  // Supprimer la catégorie (native ou perso)
  const cats=getCats().filter(c=>c!==nom);
  saveCats(cats);
  delCatCustomColor(nom);
  // Réaffecter toutes les dépenses de cette catégorie à "autre" dans TOUS les mois
  const months=STATE.months;
  let changed=false;
  Object.keys(months).forEach(k=>{
    const m=months[k];

      if(d.categorie===nom){changed=true;return{...d,categorie:"autre"};}

  });

function getCommerces(){

// PIN — PBKDF2 avec salt unique par appareil
const PIN_SALT_KEY="bf-pin-salt";
function getPinSalt(){
  let salt=localStorage.getItem(PIN_SALT_KEY);
  if(!salt){
    // Générer un salt aléatoire unique pour cet appareil
    const arr=crypto.getRandomValues(new Uint8Array(16));
    salt=btoa(String.fromCharCode(...arr));
    localStorage.setItem(PIN_SALT_KEY,salt);
  }
  return salt;
}
async function hashPin(pin){
  // PBKDF2 : résistant aux rainbow tables et au brute-force
  const keyMaterial=await crypto.subtle.importKey(
    "raw",new TextEncoder().encode(pin),{name:"PBKDF2"},false,["deriveBits"]
  );
  const saltBytes=Uint8Array.from(atob(getPinSalt()),c=>c.charCodeAt(0));
  const bits=await crypto.subtle.deriveBits(
    {name:"PBKDF2",salt:saltBytes,iterations:100000,hash:"SHA-256"},
    keyMaterial,256
  );
  return btoa(String.fromCharCode(...new Uint8Array(bits)));
}
function getPinHash(){return localStorage.getItem(PIN_KEY)||null;}
function setPinHash(hash){localStorage.setItem(PIN_KEY,hash);}
function hasPin(){return !!localStorage.getItem(PIN_KEY);}
async function migratePin(){
  const stored=localStorage.getItem(PIN_KEY);
  // Si stocké en hex SHA-256 (64 chars) ou en clair (4 chars) → migrer en PBKDF2
  if(stored&&stored.length!==44){
    // On ne peut pas migrer un hash SHA-256 sans le PIN original
    // On force une nouvelle création de PIN
    localStorage.removeItem(PIN_KEY);
    localStorage.removeItem(PIN_AUTH_KEY);
  }
}

// Extrait les données budget et restaure les méta (commerces/cats) depuis un payload
function extractAndRestore(payload){
  if(!payload||typeof payload!=="object")return null;
  if(payload._meta){
    const m=payload._meta;
    const gasSavedAt=m.savedAt||0;
    const localModAt=parseInt(localStorage.getItem("bf-meta-modAt")||"0");

    // Le plus récent gagne (last-write-wins)
    // Si GAS est plus récent → il a été modifié depuis un autre appareil → on restaure
    // Si local est plus récent → on a modifié ici → on garde le local
    if(gasSavedAt>localModAt){
      if(Array.isArray(m.commerces)&&m.commerces.length>0)
        saveCommerces(m.commerces,true);
      if(Array.isArray(m.cats)&&m.cats.length>0)
        saveCats(m.cats,true);
      if(m.catColors&&typeof m.catColors==="object")
        Object.entries(m.catColors).forEach(([k,v])=>saveCatCustomColor(k,v));
      if(m.livretA!==undefined) STATE._livretA=m.livretA;
      if(Array.isArray(m.livretCats)&&m.livretCats.length>0)
        saveLivretCats(m.livretCats,true);
      if(Array.isArray(m.paymentTypes)&&m.paymentTypes.length>0)
        savePaymentTypes(m.paymentTypes,true);
      localStorage.setItem("bf-meta-modAt",String(gasSavedAt));
    }
    const {_meta,...data}=payload;
    return Object.keys(data).length>0?data:null;
  }
  return payload;
}

const DB={
  // ── Supabase REST API ──────────────────────────────────────────────────────
  async load(){
    console.log("[DB.load] Chargement depuis Supabase...");

    // 1) Charger local d'abord
    let localData=null;
    let localSavedAt=0;
    try{
      const v=localStorage.getItem("bf-local-json");
      if(v){
        const p=JSON.parse(v);
        const d=extractAndRestore(JSON.parse(JSON.stringify(p)));
        if(d&&Object.keys(d).length>0){localData=d;localSavedAt=p._meta?.savedAt||0;}
      }
    }catch{}

    // 2) Charger depuis Supabase
    let remoteData=null;
    let remoteSavedAt=0;
    if(navigator.onLine){
      try{
        const r=await fetch(
          `${SUPABASE_URL}/rest/v1/budget?user_id=eq.shared&select=data,meta&limit=1`,
          {headers:SUPABASE_HEADERS}
        );
        const rows=await r.json();
        if(rows&&rows.length>0){
          const row=rows[0];
          const payload={...row.data,...(row.meta?{_meta:row.meta}:{})};
          const d=extractAndRestore(payload);
          if(d&&Object.keys(d).length>0){
            remoteData=d;
            remoteSavedAt=row.meta?.savedAt||0;
            console.log("[DB.load] ✅ Supabase OK, mois:", Object.keys(d).join(','));
          }
        }
      }catch(err){console.warn("[DB.load] ⚠️ Supabase échoué:", err.message);}
    }

    // 3) Fusion intelligente
    if(remoteData&&localData){
      if(localSavedAt>remoteSavedAt){
        // Local plus récent → base locale MAIS on ajoute les mois du remote absents en local
        // (mois créés sur l'autre téléphone hors ligne)
        const base={...localData};
        Object.keys(remoteData).forEach(k=>{
          if(!base[k]) base[k]=remoteData[k];
        });
        console.log("[DB.load] ✅ Local plus récent, fusion mois remote manquants");
        return base;
      } else {
        // Remote plus récent → on utilise Supabase tel quel (source de vérité)
        // On ajoute seulement les mois locaux plus récents que remote
        const base={...remoteData};
        Object.keys(localData).forEach(k=>{
          if(!base[k]){
            // Mois présent en local mais absent de Supabase = créé hors ligne
            // On l'ajoute seulement s'il est plus récent que le dernier remote
            base[k]=localData[k];
            console.log("[DB.load] Mois hors ligne ajouté:", k);
          }
        });
        console.log("[DB.load] ✅ Remote plus récent (source de vérité)");
        return base;
      }
    }
    if(localData){console.log("[DB.load] ✅ Local uniquement");return localData;}
    if(remoteData){console.log("[DB.load] ✅ Remote uniquement");return remoteData;}
    return null;
  },

  async save(data){
    const payload={
      ...data,
      _meta:{
        commerces:getCommerces(),cats:getCats(),catColors:getCatCustomColors(),
        livretA:STATE._livretA&&typeof STATE._livretA==="object"?STATE._livretA:{solde:0,transactions:[]},
        livretCats:getLivretCats(),paymentTypes:getPaymentTypes(),
        savedAt:Date.now()
      }
    };
    // Sauvegarde locale immédiate
    try{localStorage.setItem("bf-local-json",JSON.stringify(payload));}catch{}
    try{const enc=await encryptData(payload);localStorage.setItem("bf-local",enc);}catch{}
    setPending(payload);
    if(navigator.onLine) await DB._send(payload);
    else console.log("[DB.save] Hors ligne — envoi différé");
  },

  async _send(data){
    DB._lastPayload=data;
    if(!navigator.onLine) return;
    try{
      const {_meta,...months}=data;
      const r=await fetch(
        `${SUPABASE_URL}/rest/v1/budget?user_id=eq.shared`,
        {
          method:"PATCH",
          headers:{...SUPABASE_HEADERS,"Prefer":"return=minimal"},
          body:JSON.stringify({data:months, meta:_meta||{}, updated_at:new Date().toISOString()})
        }
      );
      if(r.ok||r.status===204){
        console.log("[DB._send] ✅ Supabase PATCH réussi");
        setPending(null);
      } else {
        const txt=await r.text();
        console.warn("[DB._send] ❌ Supabase erreur:", r.status, txt);
        setTimeout(()=>{if(_pendingSave&&navigator.onLine)DB._send(_pendingSave);},5000);
      }
    }catch(e){
      console.warn("[DB._send] ❌ Échec:", e.message);
      setTimeout(()=>{if(_pendingSave&&navigator.onLine)DB._send(_pendingSave);},5000);
    }
  },

  sendSync(data){
    // Supabase ne supporte pas sendBeacon — on ignore (les données sont en localStorage)
  }
};

// Coche automatiquement les dépenses du mois courant dont le jour de prélèvement est passé
function autoCocherPrelevements(months){
  const todayDay=new Date().getDate();
  const todayKey=nowKey();
  if(!months[todayKey])return 0;
  let count=0;
  months[todayKey].depenses=months[todayKey].depenses.map(d=>{
    if(d.jourPrelevement&&d.jourPrelevement<=todayDay&&!d.paye){
      count++;
      return{...d,paye:true};
    }
    return d;
  });
  return count;
}

async function init(){
  // Migration : renommer "Bio c' Bon" en "Biocoop" dans les commerces sauvegardés
  try {
    const saved = localStorage.getItem("bf-commerces");
    if(saved){
      const list = JSON.parse(saved);
      const idx = list.indexOf("Bio c' Bon");
      if(idx !== -1){ list[idx]="Biocoop"; localStorage.setItem("bf-commerces",JSON.stringify(list)); }
    }
  } catch{}

  // Reprendre l'envoi en attente si connexion revenue
  _pendingSave=loadPending();
  if(_pendingSave&&navigator.onLine){
    console.log("[init] Données en attente trouvées — envoi vers GAS...");
    DB._send(_pendingSave);
  } else if(_pendingSave){
    console.log("[init] Données en attente — en attente du réseau...");
  }

  // Détecter le retour de connexion internet
  window.addEventListener("online",()=>{
    console.log("[online] Connexion rétablie");
    if(_pendingSave){
      console.log("[online] Envoi des données en attente...");
      notify("📶 Connexion rétablie — synchronisation en cours...");
      DB._send(_pendingSave);
    }
  });

  // Indicateur visuel hors ligne
  window.addEventListener("offline",()=>{
    console.log("[offline] Connexion perdue");
    notify("📵 Hors ligne — les données sont sauvegardées localement","err");
  });
  setState({loading:true});
  const data=await DB.load();
  if(data&&Object.keys(data).length>0){
    Object.keys(data).forEach(k=>{if(!data[k].courses)data[k].courses=[];});
    // Cochage automatique des dépenses dont le jour de prélèvement est passé ce mois
    const autoCoched=autoCocherPrelevements(data);
    // Choisir le mois à afficher
    const current=nowKey();
    const availableKeys=Object.keys(data).sort();
    const bestKey=availableKeys.includes(current)?current:availableKeys[availableKeys.length-1];
    STATE.curKey=bestKey;
    setState({months:data,loading:false,lastSync:new Date()});
    // Sauvegarder si des dépenses ont été cochées automatiquement
    if(autoCoched>0){DB.save(data);notify("✓ "+autoCoched+" paiement"+(autoCoched>1?"s":"")+" du jour coché"+(autoCoched>1?"s":"")+" automatiquement");}
  } else {
    const k=nowKey();const init={[k]:makeMonth()};
    setState({months:init,loading:false,lastSync:new Date()});DB.save(init);
  }
  // Synchro Supabase — polling toutes les 10s + temps réel via Supabase Realtime
  const syncFromSupabase=async()=>{
    const d=await DB.load();
    if(d&&Object.keys(d).length>0){
      Object.keys(d).forEach(k=>{if(!d[k].courses)d[k].courses=[];});
      const autoCoched=autoCocherPrelevements(d);
      const activeTag=document.activeElement&&document.activeElement.tagName;
      const isTyping=activeTag==="INPUT"||activeTag==="TEXTAREA"||activeTag==="SELECT";
      const isConfirming=!!document.querySelector(".del-month-confirm");
      if(STATE.modal||STATE.openCourseId||isTyping||isConfirming){
        STATE.months=d;STATE.lastSync=new Date();
      } else {
        setState({months:d,lastSync:new Date()});
      }
      if(autoCoched>0){DB.save(d);notify("✓ "+autoCoched+" paiement"+(autoCoched>1?"s":"")+" du jour coché"+(autoCoched>1?"s":"")+" automatiquement");}
    }
  };
  setInterval(syncFromSupabase,10000);
}

  setMonthsAndRender(m=>({...m,courses:(m.courses||[]).filter(c=>c.id!==id)}));

function sortCourses(courses){
  return [...courses].sort((a,b)=>{
    const [da,ma]=a.date.split("/").map(Number);
    const [db,mb]=b.date.split("/").map(Number);
    if(ma!==mb)return mb-ma; // mois décroissant
    return db-da;            // jour décroissant = plus récent en premier
  });
}

  setMonthsAndRender(m=>{
    const updated=(m.courses||[]).map(c=>c.id===id?{...c,...patch}:c);
    return{...m,courses:sortCourses(updated)};
  });
}

  }
  const val=STATE.pinInput+d;
  STATE.pinInput=val;STATE.pinError="";
  updatePinDots();
  if(val.length===4){
    if(Date.now()<getBlockUntil()){STATE.pinBlocked=true;STATE.pinInput="";render();startBlockTimer();return;}
    hashPin(val).then(hash=>{
      if(hash===getPinHash()){
        clearBlock();setAuthed();STATE.pinInput="";STATE.pinError="";
        setState({screen:"app"});init();
      } else {
      const tries=getTries()+1;setTries(tries);const left=MAX_TRIES-tries;
      if(tries>=MAX_TRIES){
        setBlock();STATE.pinInput="";STATE.pinError="";STATE.pinBlocked=true;
        render();startBlockTimer();
      } else {
        incTotalTries();
        STATE.pinInput="";
        STATE.pinError=`Code incorrect — ${left} essai${left>1?"s":""} restant${left>1?"s":""}`;
        updatePinDots(true);
        setTimeout(()=>{STATE.pinError="";updatePinDots();},800);
      }
    }
    }); // fin hashPin
  }
}
function handlePinDel(){
  STATE.pinInput=STATE.pinInput.slice(0,-1);
  STATE.pinError="";
  updatePinDots();
}
function startBlockTimer(){
  // Annuler tout timer précédent
  if(window._blockTimer)clearInterval(window._blockTimer);
  window._blockTimer=setInterval(()=>{
    const left=Math.ceil((getBlockUntil()-Date.now())/1000);
    if(left<=0){
      clearInterval(window._blockTimer);window._blockTimer=null;
      clearBlock();
      STATE.pinBlocked=false;STATE.pinBlockLeft="";STATE.pinError="";
      render();
    } else {
      const mins=Math.floor(left/60);
      const secs=left%60;
      const display=mins>0?`${mins}m ${String(secs).padStart(2,"0")}s`:`${secs}s`;
      STATE.pinBlockLeft=display;
      // Mettre à jour uniquement le texte si l'élément existe
      const el=document.getElementById("pin-countdown");
      if(el) el.textContent=`🔒 Accès bloqué — réessayez dans ${display}`;
    }
  },1000);
}
function updateChangePinDots(){
  const dots=document.querySelectorAll("#change-pin-dots .pin-dot");
  if(!dots.length)return;
  dots.forEach((dot,i)=>{
    dot.className="pin-dot";
    if(STATE.changePinInput.length>i)dot.classList.add("filled");
  });
  const errEl=document.getElementById("change-pin-err");
  if(errEl)errEl.textContent=STATE.changePinError||"";
  const stepEl=document.getElementById("change-pin-step");
  if(stepEl){
    const steps=["","Entrez votre code actuel","Entrez le nouveau code","Confirmez le nouveau code"];
    stepEl.textContent=steps[STATE.changePinStep]||"";
  }
}
function handleChangePinDigit(d){
  if(STATE.changePinStep===0)return;
  const val=STATE.changePinInput+d;
  STATE.changePinInput=val;STATE.changePinError="";
  updateChangePinDots();
  if(val.length===4){
    if(STATE.changePinStep===1){
      // Hasher val et comparer avec le hash stocké
      hashPin(val).then(hash=>{
        if(hash===getPinHash()){
          STATE.changePinStep=2;STATE.changePinOld=val;STATE.changePinInput="";
        } else {
          STATE.changePinInput="";STATE.changePinError="Code actuel incorrect";
        }
        updateChangePinDots();
      });
    }
    else if(STATE.changePinStep===2){
      STATE.changePinStep=3;STATE.changePinNew=val;STATE.changePinInput="";
      updateChangePinDots();
    }
    else if(STATE.changePinStep===3){
      if(val===STATE.changePinNew){
        hashPin(val).then(h=>{setPinHash(h);});
        STATE.changePinStep=0;STATE.changePinInput="";STATE.changePinError="";
        setState({modal:null});notify("✓ Code PIN modifié !");
      } else {
        STATE.changePinInput="";STATE.changePinError="Les codes ne correspondent pas";
        updateChangePinDots();
      }
    }
  }
}
function handleChangePinDel(){
  STATE.changePinInput=STATE.changePinInput.slice(0,-1);
  STATE.changePinError="";
  updateChangePinDots();
}

// Render helpers
function el(tag,attrs={},...ch){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){if(k==="className")e.className=v;else if(k.startsWith("on"))e[k.toLowerCase()]=v;else e.setAttribute(k,v);}
  for(const c of ch.flat()){if(c==null||c===false)continue;e.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  return e;
}
function div(cls,...ch){return el("div",{className:cls},...ch);}
function inp(type,val,onChange,ph=""){const i=el("input",{type,value:val||"",placeholder:ph});i.oninput=e=>onChange(e.target.value);return i;}
function sel(val,opts,onChange){const s=el("select",{});s.onchange=e=>onChange(e.target.value);opts.forEach(o=>{const op=el("option",{value:o});op.textContent=o;if(o===val)op.selected=true;s.appendChild(op);});return s;}

function render(){
  // Bloquer le re-render si un champ est en cours de saisie dans un modal
  if(STATE.modal||STATE.openCourseId){
    const activeTag=document.activeElement&&document.activeElement.tagName;
    const isTyping=activeTag==="INPUT"||activeTag==="TEXTAREA"||activeTag==="SELECT";
    if(isTyping) return; // ne pas écraser la saisie en cours
  }
  // Mémoriser la position de scroll pour la restaurer après render
  const scrollY=window.scrollY||document.documentElement.scrollTop;
  const root=document.getElementById("root");root.innerHTML="";
  if(STATE.screen==="setup"){root.appendChild(renderSetup());return;}
  if(STATE.screen==="pin"){root.appendChild(renderPin());return;}
  if(STATE.loading){root.appendChild(div("loader",div("spinner"),el("p",{style:"color:#94a3b8;margin-top:14px"},"Chargement…")));return;}
  root.appendChild(renderApp());
  // Restaurer la position de scroll
  if(scrollY>0) requestAnimationFrame(()=>window.scrollTo(0,scrollY));
}

function handleSetupDel(){

  const refB=el("button",{className:"icon-btn",title:"Actualiser / Synchroniser"});refB.textContent="⟳";

  const mnewB=el("button",{className:"mnew"});mnewB.textContent="+ Mois";mnewB.onclick=()=>setState({modal:{type:"newMonth"}});

    let displayYear=curKey.split("-")[0];

    function renderYearGrid(){
      pk.innerHTML="";

      // Recalculer byYear depuis STATE.months à chaque render (pour capturer les nouveaux mois)
      const byYear={};

        const[y]=k.split("-");
        if(!byYear[y])byYear[y]=[];
        byYear[y].push(k);
      });

      if(!byYear[displayYear])displayYear=currentYears[currentYears.length-1];

      // ── Navigation année ──
      const nav=div("");nav.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px";
      const prevBtn=el("button",{type:"button"});prevBtn.textContent="❮";

      const yearLbl=el("span",{});yearLbl.style.cssText="color:#f1f5f9;font-weight:800;font-size:16px";

      const sortedYrs=()=>Object.keys(getYears()).sort();

      nextBtn.onclick=e=>{e.stopPropagation();const s=sortedYrs();const idx=s.indexOf(displayYear)+1;if(idx<s.length){displayYear=s[idx];renderYearGrid();}};

      const grid=div("");grid.style.cssText="display:grid;grid-template-columns:repeat(4,1fr);gap:5px";

        const mStr=String(mi).padStart(2,"0");
        const key=`${displayYear}-${mStr}`;
        const exists=(byYear[displayYear]||[]).includes(key);
        const btn=el("button",{type:"button"});
        btn.textContent=MOIS_COURT[mi-1];
        const isActive=key===curKey;
        if(!exists){
          btn.style.cssText="background:transparent;border:1px dashed #1e3a5f;color:#334155;border-radius:8px;padding:8px 4px;font-size:12px;cursor:default";
          btn.disabled=true;
        } else {
          btn.style.cssText=`background:${isActive?"#1d4ed8":"#0f172a"};border:1px solid ${isActive?"#3B82F6":"#334155"};color:${isActive?"#fff":"#cbd5e1"};border-radius:8px;padding:8px 4px;font-size:12px;font-weight:700;cursor:pointer`;
          // Indicateur visuel : mois courant non supprimable
          if(key===nowKey()&&!isActive){
            btn.style.border="1px solid #10B981";
            btn.style.color="#10B981";
            btn.title="Mois en cours — non supprimable";
          }
          btn.onclick=()=>setState({curKey:key,monthPick:false});
          // Appui long → suppression
          // Fonction de suppression commune (mobile appui long + PC clic droit)
          const showDelConfirm=()=>{
            if(allKeys.length<=1){notify("Impossible de supprimer le seul mois","err");return;}
            if(key===nowKey()){notify("Impossible de supprimer le mois en cours","err");return;}
            pk.querySelectorAll(".del-month-confirm").forEach(x=>x.remove());

            cf.style.cssText="background:#1e293b;border:1px solid #EF4444;border-radius:8px;padding:10px;margin-top:10px";
            cf.onclick=e=>e.stopPropagation();
            const msg=el("p",{style:"color:#fca5a5;font-size:12px;margin-bottom:8px;font-weight:600"});
            msg.textContent=`Supprimer ${keyLabel(key)} ?`;
            const cfBtns=div("");cfBtns.style.cssText="display:flex;gap:8px";
            const yes=el("button",{type:"button"});yes.textContent="✓ Oui";
            yes.style.cssText="flex:1;background:#EF4444;border:none;color:#fff;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
            yes.onclick=e=>{
              e.stopPropagation();
              const next={...STATE.months};
              const txASupprimer=(STATE.months[key].livretA||[]);
              if(txASupprimer.length>0){
                const autresKeys=Object.keys(next).filter(k=>k!==key).sort();
                const cible=autresKeys.find(k=>k>key)||autresKeys[autresKeys.length-1];
                if(cible) next[cible]={...next[cible],livretA:[...(next[cible].livretA||[]),...txASupprimer]};
              }
              delete next[key];
              const today=nowKey();
              let newCurKey;
              if(key===curKey){
                newCurKey=next[today]?today:(Object.keys(next).sort().reverse()[0]||today);
              } else if(key>today){
                newCurKey=next[today]?today:curKey;
              } else {
                newCurKey=curKey;
              }
              STATE.months=next;STATE.curKey=newCurKey;STATE.monthPick=false;
              persist(next);notify("✓ Mois supprimé");
            };
            const no=el("button",{type:"button"});no.textContent="Annuler";
            no.style.cssText="flex:1;background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
            no.onclick=e=>{e.stopPropagation();cf.remove();};

            pk.appendChild(cf);

          // Mobile : appui long
          let holdTimer=null;
          btn.addEventListener("touchstart",e=>{
            holdTimer=setTimeout(()=>{e.stopPropagation();showDelConfirm();},600);
          });
          btn.addEventListener("touchend",e=>{clearTimeout(holdTimer);});
          btn.addEventListener("touchmove",e=>{clearTimeout(holdTimer);});

          // PC : clic droit
          btn.addEventListener("contextmenu",e=>{
            e.preventDefault();e.stopPropagation();showDelConfirm();
          });
        }
        grid.appendChild(btn);
      }
      pk.appendChild(grid);

      // Hint suppression
      const hint=el("p",{});hint.style.cssText="color:#334155;font-size:10px;text-align:center;margin-top:10px";
      hint.textContent="Clic droit (PC) ou appui long (mobile) pour supprimer";
      pk.appendChild(hint);
    }

    renderYearGrid();
    ol.appendChild(pk);wrap.appendChild(ol);
  }
  if(toast){const t=el("div",{className:"toast"+(toast.err?" err":"")});t.textContent=toast.msg;wrap.appendChild(t);}

  const main=el("main",{});
  if(tab==="dashboard")  main.appendChild(renderDashboard(data,totSal,totDep,totEco,paye,solde));
  if(tab==="depenses")   main.appendChild(renderDepenses(data));
  if(tab==="historique") main.appendChild(renderHistorique(months,allKeys));
  if(tab==="stats")      main.appendChild(renderStats(months,allKeys));
  wrap.appendChild(main);
  if(modal)wrap.appendChild(renderModal(modal,data,months,allKeys));
  return wrap;
}

// DASHBOARD
function renderDashboard(data,totSal,totDep,totEco,paye,solde){
  const pct=totDep>0?Math.round((paye/totDep)*100):0;
  const byCat={};data.depenses.forEach(d=>{byCat[d.categorie]=(byCat[d.categorie]||0)+(+d.montant||0);});
  const murSal=data.salaires.find(x=>x.prenom==="Murielle")?.montant||0;
  const gillesSal=data.salaires.find(x=>x.prenom==="Gilles")?.montant||0;
  // Argent de poche calculé automatiquement = solde restant ÷ 2
  const pocheCalculee=Math.max(0,solde)/2;
  const col=div("col");

  // Kartes

// ── CARTE ALIMENTATION ────────────────────────────────────────────────────────
function renderAlimentationCard(data){
  const courses=data.courses||[];
  const budget=data.depenses.find(d=>d.type==="Alimentation")?.montant||800;
  const depense=courses.reduce((a,c)=>a+(+c.montant||0),0);
  const reste=budget-depense;
  const pct=budget>0?Math.min(Math.round((depense/budget)*100),100):0;
  const ok=reste>=0;

  const card=div("alim-card");
  const hdr=div("alim-header");
  const title=el("span",{className:"alim-title"},"🛒 Alimentation");
  const addB=el("button",{className:"alim-add-btn"});addB.textContent="+ Courses";
  addB.onclick=()=>setState({modal:{type:"addCourse"}});
  hdr.append(title,addB);card.appendChild(hdr);

  // Jauge
  const jauge=div("alim-jauge");
  const chiffres=div("alim-chiffres");
  chiffres.innerHTML=`<span style="color:#F59E0B;font-weight:700">Dépensé : ${fmt(depense)}</span><span style="color:#94a3b8">Budget : ${fmt(budget)}</span>`;
  jauge.appendChild(chiffres);
  const pb=div("alim-pb");const pf=div("alim-pf");
  pf.style.cssText=`width:${pct}%;background:${pct>=100?"#EF4444":pct>=80?"#F59E0B":"#10B981"}`;
  pb.appendChild(pf);jauge.appendChild(pb);
  card.appendChild(jauge);

  // Reste
  const resteEl=div("alim-reste");resteEl.style.color=ok?"#10B981":"#EF4444";
  resteEl.textContent=ok?fmt(reste):"−"+fmt(Math.abs(reste));
  const resteLabel=div("alim-reste-label");
  resteLabel.textContent=ok?`reste à dépenser (${100-pct}%)`:`dépassement du budget !`;
  card.append(resteEl,resteLabel);

  // Historique courses
  // Calculer les jours disponibles du mois courant
  const curKey=STATE.curKey;
  const [curY,curM]=curKey.split("-").map(Number);
  const daysInMonth=new Date(curY,curM,0).getDate();
  const dayOptions=Array.from({length:daysInMonth},(_,i)=>{
    const d=String(i+1).padStart(2,"0");
    const m=String(curM).padStart(2,"0");
    return `${d}/${m}`;
  });

  if(courses.length>0){
    const hist=div("alim-courses");
    hist.appendChild(el("div",{className:"alim-courses-title"},`${courses.length} course${courses.length>1?"s":""} ce mois`));
    [...sortCourses(courses)].forEach(c=>{
      const row=div("alim-course-row");
      row.style.flexDirection="column";row.style.alignItems="stretch";row.style.gap="0";
      row.onclick=e=>e.stopPropagation(); // bloquer toute remontée depuis la ligne

      // Ligne principale
      const mainLine=div("");mainLine.style.cssText="display:flex;align-items:center;justify-content:space-between;padding:4px 0";

      // Date cliquable
      const dateBtn=el("button",{type:"button"});
      dateBtn.style.cssText="background:#1e3a5f;border:none;color:#60a5fa;font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px;cursor:pointer;flex-shrink:0";
      dateBtn.textContent=c.date;
      dateBtn.title="Modifier la date";

      const lbl=el("span",{className:"alim-course-label"});lbl.textContent=c.label;
      const mnt=el("span",{className:"alim-course-mnt"});mnt.textContent=fmt(c.montant);
      const del=el("button",{type:"button",className:"alim-course-del"});del.textContent="✕";
      del.onclick=e=>{e.stopPropagation();delCourse(c.id);};
      mainLine.append(dateBtn,lbl,mnt,del);
      row.appendChild(mainLine);

      // Panneau édition date (caché par défaut)
      const editPanel=div("");
      editPanel.style.cssText=`display:${STATE.openCourseId===c.id?"flex":"none"};background:#0f172a;border-radius:8px;padding:10px;margin-bottom:6px;gap:8px;flex-direction:column`;
      editPanel.onclick=e=>e.stopPropagation();

      // Sélecteur de jour
      const dateRow=div("");dateRow.style.cssText="display:flex;align-items:center;gap:8px";
      const dateLbl=el("span",{style:"color:#64748b;font-size:12px;flex-shrink:0"});dateLbl.textContent="Jour :";
      const dateSel=el("select",{});
      dateSel.style.cssText="flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#f1f5f9;font-size:14px";
      dateSel.onclick=e=>e.stopPropagation();
      dayOptions.forEach(d=>{
        const o=el("option",{value:d});o.textContent=d;
        if(d===c.date)o.selected=true;
        dateSel.appendChild(o);
      });
      dateRow.append(dateLbl,dateSel);

      // Champ montant éditable
      const mntRow=div("");mntRow.style.cssText="display:flex;align-items:center;gap:8px";
      const mntLbl=el("span",{style:"color:#64748b;font-size:12px;flex-shrink:0"});mntLbl.textContent="Montant :";
      const mntInp=el("input",{type:"number",step:"0.01",value:c.montant});
      mntInp.style.cssText="flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#f1f5f9;font-size:14px";
      mntInp.onclick=e=>e.stopPropagation();
      mntRow.append(mntLbl,mntInp);

      // Boutons valider / annuler
      const editBtns=div("");editBtns.style.cssText="display:flex;gap:8px";
      const saveB=el("button",{type:"button"});saveB.textContent="✓ Valider";
      saveB.style.cssText="flex:1;background:#3B82F6;border:none;color:#fff;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
      saveB.onclick=e=>{
        e.stopPropagation();
        STATE.openCourseId=null;
        updateCourse(c.id,{date:dateSel.value,montant:parseFloat(mntInp.value)||c.montant});
        editPanel.style.display="none";
      };
      const cancelB=el("button",{type:"button"});cancelB.textContent="Annuler";
      cancelB.style.cssText="flex:1;background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
      cancelB.onclick=e=>{e.stopPropagation();STATE.openCourseId=null;editPanel.style.display="none";};
      editBtns.append(saveB,cancelB);

      editPanel.append(dateRow,mntRow,editBtns);
      row.appendChild(editPanel);

      // Toggle panneau au clic sur la date
      dateBtn.onclick=e=>{
        e.stopPropagation();
        const isOpen=STATE.openCourseId===c.id;
        STATE.openCourseId=isOpen?null:c.id;
        editPanel.style.display=isOpen?"none":"flex";
      };

      hist.appendChild(row);
    });
    card.appendChild(hist);
  } else {
    const empty=el("p",{style:"color:#475569;font-size:12px;text-align:center;padding:8px 0"});
    empty.textContent="Aucune course enregistrée ce mois";
    card.appendChild(empty);
  }
  return card;
}

// HISTORIQUE
// ── STATISTIQUES ─────────────────────────────────────────────────────────────
function renderStats(months,allKeys){
  const col=div("col");
  if(allKeys.length<2){
    const c=div("card");
    c.innerHTML=`<p style="color:#64748b;text-align:center;padding:24px 0">📉 Les statistiques apparaîtront dès que vous aurez 2 mois enregistrés.</p>`;
    col.appendChild(c);return col;
  }

  // Données triées du plus ancien au plus récent
  // Exclure les mois sans salaires (mois futurs non encore remplis)
  const sorted=[...allKeys].sort().filter(k=>{
    const sal=months[k].salaires.reduce((a,x)=>a+(+x.montant||0),0);
    return sal>0;
  });

  if(sorted.length<2){
    const c=div("card");
    c.innerHTML=`<p style="color:#64748b;text-align:center;padding:24px 0;font-size:13px">📉 Les statistiques nécessitent au moins 2 mois avec des salaires saisis.</p>`;
    col.appendChild(c);return col;
  }

  // Calculer les séries mensuelles
  const salaires=sorted.map(k=>months[k].salaires.reduce((a,x)=>a+(+x.montant||0),0));
  const depenses=sorted.map(k=>months[k].depenses.reduce((a,x)=>a+(+x.montant||0),0));
  const courses=sorted.map(k=>(months[k].courses||[]).reduce((a,x)=>a+(+x.montant||0),0));
  const epargne=sorted.map(k=>months[k].economies.reduce((a,x)=>a+(+x.montant||0),0));
  const soldes=sorted.map((k,i)=>salaires[i]-depenses[i]-epargne[i]);

  // Séries cumulées
  const cumul=(arr)=>arr.reduce((acc,v,i)=>{acc.push((acc[i-1]||0)+v);return acc;},[]);
  const salCum=cumul(salaires);
  const depCum=cumul(depenses);
  const coursCum=cumul(courses);

  // Fonction de dessin courbe SVG
  function makeCurveCard(title,series,colors,legendLabels){
    const card=div("card");
    card.appendChild(el("h3",{className:"ct"},title));

    const W=340,H=160,PL=52,PR=16,PT=16,PB=32;
    const cW=W-PL-PR,cH=H-PT-PB;
    const n=sorted.length;

    // Calculer min/max globaux sur toutes les séries
    const allVals=series.flat();
    const minV=0; // toujours partir de 0 pour les courbes financières
    const maxV=Math.max(...allVals,1); // au moins 1 pour éviter division par zéro
    const range=maxV-minV;

    const xStep=n>1?cW/(n-1):cW/2;

    const toX=i=>PL+(n>1?i*xStep:cW/2);
    const toY=v=>PT+cH-((v-minV)/range)*cH;

    // SVG
    const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
    svg.style.cssText="width:100%;height:auto;overflow:visible";

    // Grilles horizontales
    [0,0.25,0.5,0.75,1].forEach(t=>{
      const y=PT+cH*(1-t);
      const line=document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1",PL);line.setAttribute("x2",PL+cW);
      line.setAttribute("y1",y);line.setAttribute("y2",y);
      line.setAttribute("stroke","#1e3a5f");line.setAttribute("stroke-width","0.5");
      svg.appendChild(line);
      // Labels Y
      const txt=document.createElementNS("http://www.w3.org/2000/svg","text");
      txt.setAttribute("x",PL-4);txt.setAttribute("y",y+4);
      txt.setAttribute("text-anchor","end");txt.setAttribute("font-size","9");
      txt.setAttribute("fill","#475569");
      const val=t*range; // minV=0 donc pas besoin d'ajouter minV
      txt.textContent=val>=1000?`${Math.round(val/100)/10}k`:`${Math.round(val)}`;
      svg.appendChild(txt);
    });

    // Labels X (mois)
    sorted.forEach((k,i)=>{
      const txt=document.createElementNS("http://www.w3.org/2000/svg","text");
      txt.setAttribute("x",toX(i));txt.setAttribute("y",H-6);
      txt.setAttribute("text-anchor","middle");txt.setAttribute("font-size","8");
      txt.setAttribute("fill","#475569");
      const[y,m]=k.split("-");
      txt.textContent=`${["J","F","M","A","M","J","J","A","S","O","N","D"][+m-1]}${y.slice(2)}`;
      svg.appendChild(txt);
    });

    // Dessiner les courbes
    series.forEach((data,si)=>{
      if(n<2){return;}
      // Zone remplie sous la courbe (première série seulement pour lisibilité)
      if(si===0){
        let area=`M${toX(0)},${PT+cH}`;
        area+=` L${toX(0)},${toY(data[0])}`;
        data.forEach((_,i)=>{if(i>0)area+=` L${toX(i)},${toY(data[i])}`;});
        area+=` L${toX(n-1)},${PT+cH} Z`;
        const aPath=document.createElementNS("http://www.w3.org/2000/svg","path");
        aPath.setAttribute("d",area);
        aPath.setAttribute("fill",colors[si]);
        aPath.setAttribute("fill-opacity","0.08");
        svg.appendChild(aPath);
      }

      // Ligne courbe
      let d=`M${toX(0)},${toY(data[0])}`;
      data.forEach((_,i)=>{if(i>0)d+=` L${toX(i)},${toY(data[i])}`;});
      const path=document.createElementNS("http://www.w3.org/2000/svg","path");
      path.setAttribute("d",d);
      path.setAttribute("fill","none");
      path.setAttribute("stroke",colors[si]);
      path.setAttribute("stroke-width","2");
      path.setAttribute("stroke-linecap","round");
      path.setAttribute("stroke-linejoin","round");
      svg.appendChild(path);

      // Points
      data.forEach((v,i)=>{
        const circle=document.createElementNS("http://www.w3.org/2000/svg","circle");
        circle.setAttribute("cx",toX(i));circle.setAttribute("cy",toY(v));
        circle.setAttribute("r","3");circle.setAttribute("fill",colors[si]);
        circle.setAttribute("stroke","#1e293b");circle.setAttribute("stroke-width","1.5");
        svg.appendChild(circle);
      });
    });

    card.appendChild(svg);

    // Légende
    const leg=div("");leg.style.cssText="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px";
    series.forEach((_,si)=>{
      const item=div("");item.style.cssText="display:flex;align-items:center;gap:5px";
      const dot=div("");dot.style.cssText=`width:10px;height:10px;border-radius:50%;background:${colors[si]};flex-shrink:0`;
      const lbl=el("span",{style:"font-size:11px;color:#94a3b8;font-weight:600"});lbl.textContent=legendLabels[si];
      item.append(dot,lbl);leg.appendChild(item);
    });
    card.appendChild(leg);

    // Valeurs du dernier mois
    const lastDiv=div("");lastDiv.style.cssText="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;border-top:1px solid #334155;padding-top:10px";
    series.forEach((data,si)=>{
      const v=data[data.length-1];
      const item=div("");item.style.cssText="flex:1;min-width:80px;text-align:center";
      item.innerHTML=`<div style="font-size:10px;color:#64748b">${legendLabels[si]}</div><div style="font-size:13px;font-weight:800;color:${colors[si]}">${fmt(v)}</div>`;
      lastDiv.appendChild(item);
    });
    card.appendChild(lastDiv);

    return card;
  }

  // Graphique 1 : Salaires vs Dépenses vs Solde (mensuel)
  col.appendChild(makeCurveCard(
    "💰 Revenus & Dépenses — mensuel",
    [salaires, depenses, soldes],
    ["#10B981","#EF4444","#3B82F6"],
    ["Salaires","Dépenses","Solde"]
  ));

  // Graphique 2 : Salaires vs Dépenses cumulés
  col.appendChild(makeCurveCard(
    "📈 Revenus & Dépenses — cumulés",
    [salCum, depCum],
    ["#10B981","#EF4444"],
    ["Salaires cumulés","Dépenses cumulées"]
  ));

  // Graphique 3 : Courses alimentation mensuel + cumulé
  const totalCourses=courses.reduce((a,v)=>a+v,0);
  if(totalCourses===0){
    const c=div("card");
    c.innerHTML=`<h3 class="ct">🛒 Courses alimentation</h3><p style="color:#64748b;text-align:center;padding:16px 0;font-size:13px">Aucune course saisie pour le moment</p>`;
    col.appendChild(c);
  } else {
    col.appendChild(makeCurveCard(
      "🛒 Courses alimentation",
      [courses, coursCum],
      ["#F59E0B","#3B82F6"],
      ["Par mois","Cumulées"]
    ));
  }

  // Graphique 4 : Épargne mensuelle + cumulée
  col.appendChild(makeCurveCard(
    "🏦 Épargne mensuelle",
    [epargne, cumul(epargne)],
    ["#8B5CF6","#10B981"],
    ["Par mois","Cumulée"]
  ));

  // Graphique 5 : Évolution Livret A
  const livretSoldes=sorted.map((k,idx)=>{
    let s=0;
    sorted.slice(0,idx+1).forEach(kk=>{
      (months[kk].livretA||[]).forEach(tx=>{s+=tx.type==="depot"?tx.montant:-tx.montant;});
    });
    return s;
  });
  const livretMouvements=sorted.map(k=>(months[k].livretA||[]).reduce((a,tx)=>a+(tx.type==="depot"?tx.montant:-tx.montant),0));
  const hasLivret=livretSoldes.some(v=>v>0);
  if(hasLivret){
    col.appendChild(makeCurveCard(
      "🏦 Livret A — évolution",
      [livretSoldes, livretMouvements],
      ["#F59E0B","#10B981"],
      ["Solde cumulé","Mouvements du mois"]
    ));
  }

  return col;
}

function renderHistorique(months,allKeys){
  const col=div("col");
  if(allKeys.length<2){const c=div("card");c.innerHTML=`<p style="color:#64748b;text-align:center;padding:24px 0">📅 L'historique apparaîtra dès que vous aurez 2 mois enregistrés.</p>`;col.appendChild(c);return col;}

  // Filtrer uniquement les mois avec salaires saisis

    return{k,label:keyLabel(k),sal,dep,eco,solde:sal-dep-eco,pp,courses,budgetAlim};
  });

  const maxDep=Math.max(...rows.map(r=>r.dep),1);

  t.appendChild(tb);tc.appendChild(t);col.appendChild(tc);

  // Alimentation historique
  const ac=div("card");ac.appendChild(el("h3",{className:"ct"},"🛒 Alimentation par mois"));
  rows.forEach(r=>{
    const pct=r.budgetAlim>0?Math.min(Math.round((r.courses/r.budgetAlim)*100),100):0;
    const ok=r.courses<=r.budgetAlim;
    const d=div("");d.style.marginBottom="12px";
    d.innerHTML=`
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span style="color:#94a3b8;font-weight:600">${r.label}</span>

      </div>
      <div style="background:#1e3a5f;border-radius:6px;height:8px;overflow:hidden">
        <div style="background:${pct>=100?"#EF4444":pct>=80?"#F59E0B":"#10B981"};height:100%;border-radius:6px;width:${pct}%"></div>
      </div>
      <div style="font-size:11px;color:#475569;margin-top:2px">${ok?"Reste : "+fmt(r.budgetAlim-r.courses):"Dépassement : "+fmt(r.courses-r.budgetAlim)}</div>`;
    ac.appendChild(d);
  });col.appendChild(ac);

  const bc=div("card");bc.appendChild(el("h3",{className:"ct"},"Évolution des dépenses"));
  rows.forEach(r=>{const d=div("");d.style.marginBottom="12px";d.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#94a3b8;font-weight:600">${r.label}</span><span style="color:#EF4444;font-weight:700">${fmt(r.dep)}</span></div><div style="background:#1e3a5f;border-radius:6px;height:8px;overflow:hidden"><div style="background:linear-gradient(90deg,#EF4444,#F59E0B);height:100%;border-radius:6px;width:${Math.round((r.dep/maxDep)*100)}%"></div></div><div style="font-size:11px;color:#475569;margin-top:2px">Réglé : ${r.pp}%</div>`;bc.appendChild(d);});col.appendChild(bc);

  const ecc=div("card");ecc.appendChild(el("h3",{className:"ct"},"Épargne cumulée"));

  // ── LIVRET A ──────────────────────────────────────────────────────────────
  // Transactions du mois courant
  const curMonthData=months[STATE.curKey]||{};
  const livTx=()=>curMonthData.livretA||[];
  // Solde initial = cumul de tous les mois PRÉCÉDENTS
  const allSortedKeys=Object.keys(months).sort();
  const curKeyIdx=allSortedKeys.indexOf(STATE.curKey);
  let livSoldeInit=0;
  allSortedKeys.slice(0,curKeyIdx).forEach(k=>{
    (months[k].livretA||[]).forEach(tx=>{

        ${livSoldeMois>=0?"+":""}${fmt(livSoldeMois)}

  const livSoldeEl=livHdr.querySelector("span:nth-child(2)")||livHdr;

  // Formulaire ajout transaction

  // Type dépôt/retrait

  let livType=lf.type||"depot";
  const btnDepot=el("button",{type:"button"});btnDepot.textContent="⬆ Dépôt";
  btnDepot.style.cssText="flex:1;background:#10B981;border:none;color:#fff;border-radius:8px;padding:7px;font-weight:700;font-size:12px;cursor:pointer";
  const btnRetrait=el("button",{type:"button"});btnRetrait.textContent="⬇ Retrait";
  btnRetrait.style.cssText="flex:1;background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:7px;font-weight:700;font-size:12px;cursor:pointer";
  const updateTypeBtns=()=>{
    btnDepot.style.background=livType==="depot"?"#10B981":"#334155";
    btnDepot.style.color=livType==="depot"?"#fff":"#94a3b8";
    btnRetrait.style.background=livType==="retrait"?"#EF4444":"#334155";
    btnRetrait.style.color=livType==="retrait"?"#fff":"#94a3b8";

  btnDepot.onclick=e=>{e.stopPropagation();livType="depot";lf.type="depot";updateTypeBtns();};

  livTypeRow.append(btnDepot,btnRetrait);livForm.appendChild(livTypeRow);

  function renderLivCatBtns(){

    const txs=[...livTx(),tx].sort((a,b)=>{
      const [da,ma]=a.date.split("/").map(Number);

      if(ma!==mb)return mb-ma;return db-da;
    });
    // Sauvegarder dans le mois courant
    updCur(m=>({...m,livretA:txs}));

  livInputRow.append(livMntInp,livDateSel,livAddBtn);livForm.appendChild(livInputRow);
  livretCard.appendChild(livForm);

      row.onclick=e=>e.stopPropagation();
      const dateEl=el("span",{style:"color:#64748b;font-size:11px;width:45px;flex-shrink:0"});dateEl.textContent=tx.date;
      const typeEl=el("span",{style:`font-size:11px;font-weight:700;color:${tx.type==="depot"?"#10B981":"#EF4444"};flex-shrink:0`});
      typeEl.textContent=tx.type==="depot"?"⬆":"⬇";
      const catEl=el("span",{style:"color:#94a3b8;font-size:11px;flex:1;padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"});
      catEl.textContent=tx.cat||"";
      const mntEl=el("span",{style:`color:${tx.type==="depot"?"#10B981":"#EF4444"};font-weight:700;font-size:13px;flex-shrink:0`});
      mntEl.textContent=(tx.type==="depot"?"+":"-")+fmt(tx.montant);
      const delBtn=el("button",{type:"button"});delBtn.textContent="✕";
      delBtn.style.cssText="background:transparent;border:none;color:#475569;font-size:11px;cursor:pointer;padding:0 0 0 6px";
      delBtn.onclick=e=>{
        e.stopPropagation();
        const txs2=livTx().filter(t=>t.id!==tx.id);
        updCur(m=>({...m,livretA:txs2}));
        renderLivretTx();
      };
      row.append(dateEl,typeEl,catEl,mntEl,delBtn);livTxList.appendChild(row);
    });
  }
  renderLivretTx();
  livretCard.appendChild(livTxList);
  ecc.appendChild(livretCard);

  // ── Épargne mensuelle cumulée ─────────────────────────────────────────────
  let cum=0;
  [...rows].reverse().forEach(r=>{
    cum+=r.eco;
    const li=div("li");
    li.innerHTML=`<span style="color:#94a3b8;font-size:13px">${r.label}</span><div style="text-align:right"><div style="color:#F59E0B;font-weight:700;font-size:13px">${fmt(r.eco)}/mois</div><div style="color:#64748b;font-size:11px">Cumulé : ${fmt(cum)}</div></div>`;
    ecc.appendChild(li);
  });

  col.appendChild(ecc);
  return col;
}

        if(item.dateFin){
          const[fy,fm]=item.dateFin.split("-");
          dateFinPreview.textContent=`⏱ Fin de paiement : ${MOIS_COURT[+fm-1]} ${fy}`;

      addCustomCat(nom,cSelectedColor);
      createInp.value="";cPreview.textContent="aperçu";cErr.textContent="";
      notify("✓ Catégorie créée !");
      renderAllCats();
    };
    cBottom.append(cPreview,cBtn);
    createWrap.append(createTitle,createInp,cColorLabel,cColorGrid,cErr,cBottom);
    m.appendChild(createWrap);

    const listWrap=div("");listWrap.id="cat-manage-list";

    function renderAllCats(){
      listWrap.innerHTML="";
      const allCats=getCats().slice().sort((a,b)=>a.localeCompare(b,"fr"));
      allCats.forEach(c=>{
        const isNative=CATEGORIES_BASE.includes(c);
        const row=div("");row.style.cssText="background:#0f172a;border-radius:8px;margin-bottom:8px;overflow:hidden";

        // ── Ligne principale ──
        const main=div("");main.style.cssText="display:flex;align-items:center;justify-content:space-between;padding:8px 10px";
        const left=div("");left.style.cssText="display:flex;align-items:center;gap:8px;flex:1;min-width:0";
        const dot=div("");dot.style.cssText=`width:10px;height:10px;border-radius:50%;background:${getCatColor(c)};flex-shrink:0`;
        const lbl=el("span",{style:"color:#cbd5e1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"});lbl.textContent=c;
        let nb=0;Object.values(STATE.months).forEach(mo=>mo.depenses.forEach(d=>{if(d.categorie===c)nb++;}));
        const count=el("span",{style:"color:#64748b;font-size:11px;margin-left:4px;flex-shrink:0"});
        count.textContent=nb>0?`(${nb})` :"";
        left.append(dot,lbl,count);

        const rowBtns=div("");rowBtns.style.cssText="display:flex;gap:6px;flex-shrink:0";

        // 🎨 Couleur
        const colorB=el("button",{type:"button"});colorB.textContent="🎨";
        colorB.style.cssText="background:#334155;border:none;color:#fff;border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer";
        colorB.onclick=e=>{
          e.stopPropagation();
          const existing=row.querySelector(".color-picker-inline");
          if(existing){existing.remove();return;}
          // fermer autres pickers
          listWrap.querySelectorAll(".color-picker-inline").forEach(x=>x.remove());
          listWrap.querySelectorAll(".rename-wrap").forEach(x=>x.remove());
          const picker=div("color-picker-inline");picker.style.cssText="display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:#1e293b;border-top:1px solid #334155";
          PALETTE.forEach(color=>{
            const sw=div("");sw.style.cssText=`width:26px;height:26px;border-radius:50%;background:${color};cursor:pointer;border:${getCatColor(c)===color?"2px solid #fff":"2px solid transparent"}`;
            sw.onclick=e=>{e.stopPropagation();saveCatCustomColor(c,color);dot.style.background=color;picker.remove();notify("✓ Couleur modifiée !");};
            picker.appendChild(sw);
          });
          row.appendChild(picker);
        };

        // ✏️ Renommer
        const renameB=el("button",{type:"button"});renameB.textContent="✏️";
        renameB.style.cssText="background:#334155;border:none;color:#fff;border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer";
        renameB.onclick=e=>{
          e.stopPropagation();
          const existing=row.querySelector(".rename-wrap");
          if(existing){existing.remove();return;}
          listWrap.querySelectorAll(".rename-wrap").forEach(x=>x.remove());
          listWrap.querySelectorAll(".color-picker-inline").forEach(x=>x.remove());
          const rw=div("rename-wrap");rw.style.cssText="display:flex;gap:8px;padding:8px 10px;background:#1e293b;border-top:1px solid #334155";
          rw.onclick=e=>e.stopPropagation();
          const ri=el("input",{type:"text",value:c,placeholder:"Nouveau nom…"});
          ri.style.cssText="flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#f1f5f9;font-size:14px";
          ri.onclick=e=>e.stopPropagation();
          const rb=el("button",{type:"button"});rb.textContent="✓";
          rb.style.cssText="background:#3B82F6;border:none;color:#fff;border-radius:8px;padding:6px 12px;font-weight:700;font-size:14px;cursor:pointer";
          rb.onclick=e=>{
            e.stopPropagation();
            const newName=ri.value.trim().toLowerCase();
            if(!newName||newName===c){rw.remove();return;}
            if(getCats().includes(newName)){notify("⚠ Ce nom existe déjà");return;}
            // Renommer dans getCats
            const cats=getCats().map(x=>x===c?newName:x);
            saveCats(cats);
            // Transférer la couleur
            const col=getCatCustomColors()[c];
            if(col)saveCatCustomColor(newName,col);
            delCatCustomColor(c);
            // Renommer dans toutes les dépenses
            Object.keys(STATE.months).forEach(k=>{
              STATE.months[k].depenses=STATE.months[k].depenses.map(d=>d.categorie===c?{...d,categorie:newName}:d);
            });
            DB.save(STATE.months);
            notify("✓ Catégorie renommée !");
            renderAllCats();
          };
          const rc=el("button",{type:"button"});rc.textContent="✕";
          rc.style.cssText="background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer";
          rc.onclick=e=>{e.stopPropagation();rw.remove();};
          rw.append(ri,rb,rc);row.appendChild(rw);
          setTimeout(()=>ri.focus(),50);
        };

        // 🗑 Supprimer
        const delB=el("button",{type:"button"});delB.textContent="🗑";
        delB.style.cssText="background:#7f1d1d;border:none;color:#fca5a5;border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer";
        delB.onclick=e=>{
          e.stopPropagation();
          listWrap.querySelectorAll(".del-confirm").forEach(x=>x.remove());
          listWrap.querySelectorAll(".rename-wrap,.color-picker-inline").forEach(x=>x.remove());
          const cf=div("del-confirm");cf.style.cssText="padding:8px 10px;background:#1e293b;border-top:1px solid #EF4444";
          cf.onclick=e=>e.stopPropagation();
          const msg=el("p",{style:"color:#fca5a5;font-size:12px;margin-bottom:8px"});
          msg.innerHTML=nb>0
            ?`⚠ <strong>${nb} dépense${nb>1?"s":""}</strong> → réaffectée${nb>1?"s":""} à <strong>"autre"</strong>`
            :`Supprimer <strong>"${c}"</strong> ?`;
          const cfBtns=div("");cfBtns.style.cssText="display:flex;gap:8px";
          const yes=el("button",{type:"button"});yes.textContent="✓ Confirmer";
          yes.style.cssText="flex:1;background:#EF4444;border:none;color:#fff;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
          yes.onclick=e=>{
            e.stopPropagation();
            delCatAndReassign(c);
            renderAllCats();
          };
          const no=el("button",{type:"button"});no.textContent="Annuler";
          no.style.cssText="flex:1;background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
          no.onclick=e=>{e.stopPropagation();cf.remove();};
          cfBtns.append(yes,no);cf.append(msg,cfBtns);row.appendChild(cf);
        };

        rowBtns.append(colorB,renameB,delB);
        main.append(left,rowBtns);row.appendChild(main);
        listWrap.appendChild(row);
      });

      if(getCats().length===0){
        const p=el("p",{style:"color:#475569;font-size:13px;padding:8px 0"});
        p.textContent="Aucune catégorie";listWrap.appendChild(p);
      }
    }
    renderAllCats();
    m.appendChild(listWrap);

    const ca=el("button",{className:"b-can",style:"margin-top:20px;width:100%"});ca.textContent="← Retour";
    ca.onclick=()=>setState({modal:modal.prevModal||null});
    m.appendChild(ca);
  }
  ol.appendChild(m);return ol;
}

// START
// Forcer envoi vers GAS si la page est fermée avant le timer
window.addEventListener("beforeunload",()=>{
  if(_pendingSave) DB.sendSync(_pendingSave);
});
(async()=>{
  // Supabase — pas besoin de déchiffrer une URL
  await migratePin();
  if(!hasPin()){
    setState({screen:"setup",setupStep:0,setupInput:"",setupError:""});
  } else if(isAuthed()){
    setState({screen:"app"});init();
  } else {
    setState({screen:"pin"});
  }
})();
</script>
