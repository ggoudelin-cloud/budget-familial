<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>Budget Familial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:#f1f5f9;font-family:'Segoe UI',sans-serif;max-width:480px;margin:0 auto;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;animation:fadeIn .4s}
.pin-logo{font-size:48px;margin-bottom:8px}
.pin-title{font-size:22px;font-weight:900;margin-bottom:4px}
.pin-sub{font-size:13px;color:#64748b;margin-bottom:32px}
.pin-dots{display:flex;gap:16px;margin-bottom:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #475569;transition:all .2s}
.pin-dot.filled{background:#3B82F6;border-color:#3B82F6}
.pin-dot.error{background:#EF4444;border-color:#EF4444}
.pin-error{color:#EF4444;font-size:13px;font-weight:700;margin-bottom:16px;min-height:20px}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-btn{background:#1e293b;border:none;color:#f1f5f9;font-size:24px;font-weight:700;border-radius:50%;width:72px;height:72px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;margin:0 auto}
.pin-btn:active{background:#334155;transform:scale(.92)}
.pin-btn.del{font-size:20px;background:transparent;color:#64748b}
.pin-btn.empty{background:transparent;cursor:default}
.pin-blocked{color:#EF4444;font-size:13px;font-weight:700;margin-top:16px}
header{background:#1e293b;padding:14px 16px 0;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.5)}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
h1{font-size:19px;font-weight:900;letter-spacing:-.5px}
.sync-info{font-size:11px;color:#64748b;margin-top:2px}
.hbtns{display:flex;gap:8px}
.icon-btn{background:#334155;border:none;color:#94a3b8;font-size:16px;border-radius:8px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mbar{display:flex;gap:8px;margin-bottom:10px}
.msel{flex:1;background:#0f172a;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:7px 12px;font-weight:700;font-size:13px;cursor:pointer;text-align:left}
.mnew{background:#1d4ed8;border:none;color:#fff;border-radius:8px;padding:7px 12px;font-weight:700;font-size:12px;cursor:pointer}
.tabs{display:flex;gap:4px}
.tab{flex:1;padding:8px 4px;background:transparent;border:none;color:#64748b;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent}
.tab.on{color:#3B82F6;border-bottom:3px solid #3B82F6}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#10B981;color:#fff;padding:8px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;pointer-events:none;animation:fadeIn .3s}
.toast.err{background:#b45309}
main{padding:12px 12px 90px}
.col{display:flex;flex-direction:column;gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#1e293b;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.3);animation:fadeIn .3s}
.ct{margin:0 0 12px;font-size:13px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.li{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2744}
.li:last-child{border-bottom:none}
.kard{border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.pb{background:#334155;border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px}
.pf{background:linear-gradient(90deg,#10B981,#3B82F6);height:100%;border-radius:8px;transition:width .5s}
.plbl{display:flex;justify-content:space-between;font-size:12px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.clbl{width:90px;font-size:12px;color:#94a3b8;flex-shrink:0}
.cbar{flex:1;background:#334155;border-radius:4px;height:6px;overflow:hidden}
.cfill{height:100%;border-radius:4px}
.cval{width:78px;text-align:right;font-size:12px;font-weight:700}
.fscr{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.fscr::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid #334155;background:transparent;color:#64748b;font-size:12px;font-weight:700;cursor:pointer}
.fbtn.on{background:#3B82F6;border-color:#3B82F6;color:#fff}
.drow{display:flex;align-items:center;gap:10px;background:#1e293b;border-radius:10px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.chk{width:28px;height:28px;border-radius:8px;border:2px solid #475569;color:#fff;font-weight:900;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:transparent;transition:all .2s}
.chk.done{background:#10B981;border-color:#10B981}
.pill{display:inline-block;font-size:10px;color:#fff;padding:2px 7px;border-radius:10px;margin-top:3px;font-weight:700}
.eBtn{background:transparent;border:none;font-size:15px;cursor:pointer;padding:2px 4px;flex-shrink:0}
.add-btn{background:#1e3a5f;border:2px dashed #3B82F6;color:#3B82F6;border-radius:10px;padding:12px;font-weight:800;font-size:14px;cursor:pointer;text-align:center;width:100%}
.sm-btn{background:#1d4ed8;border:none;color:#fff;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.overlay2{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;justify-content:center;align-items:flex-start;padding-top:80px}
.modal{background:#1e293b;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:82vh;overflow-y:auto;animation:slideUp .25s}
.picker{background:#1e293b;border-radius:12px;padding:16px;width:270px;max-height:370px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.ptitle{margin:0 0 10px;font-size:14px;font-weight:800;color:#94a3b8}
.pbtn{display:block;width:100%;background:transparent;border:none;color:#cbd5e1;padding:10px 8px;text-align:left;font-weight:600;font-size:14px;cursor:pointer;border-radius:8px}
.pbtn.on{background:#1d4ed8;color:#fff}
.mt{margin:0 0 16px;font-size:18px;font-weight:900}
label{display:block;color:#94a3b8;font-size:12px;font-weight:700;margin-bottom:4px;margin-top:12px}
input,select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:15px;box-sizing:border-box}
.mbtns{display:flex;gap:8px;margin-top:20px}
.b-save{flex:1;background:#3B82F6;border:none;color:#fff;border-radius:10px;padding:12px;font-weight:800;font-size:15px;cursor:pointer}
.b-del{background:#EF4444;border:none;color:#fff;border-radius:10px;padding:12px 16px;font-weight:800;font-size:15px;cursor:pointer}
.b-can{flex:1;background:#334155;border:none;color:#94a3b8;border-radius:10px;padding:12px;font-weight:800;font-size:15px;cursor:pointer}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.spinner{width:44px;height:44px;border:4px solid #334155;border-top:4px solid #3B82F6;border-radius:50%;animation:spin 1s linear infinite}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* ── ALIMENTATION ── */
.alim-card{background:#1e293b;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.alim-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.alim-title{font-size:13px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.alim-add-btn{background:#065f46;border:none;color:#6ee7b7;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
.alim-jauge{margin-bottom:12px}
.alim-pb{border-radius:8px;height:14px;overflow:hidden;margin-bottom:6px;background:#334155}
.alim-pf{height:100%;border-radius:8px;transition:width .5s}
.alim-chiffres{display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px}
.alim-reste{text-align:center;font-size:18px;font-weight:900;margin:8px 0 4px}
.alim-reste-label{text-align:center;font-size:11px;color:#94a3b8;margin-bottom:12px}
.alim-courses{border-top:1px solid #1e3a5f;padding-top:10px;margin-top:4px}
.alim-courses-title{font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.alim-course-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0f172a}
.alim-course-date{font-size:11px;color:#64748b}
.alim-course-label{font-size:13px;color:#cbd5e1;font-weight:600;flex:1;margin:0 8px}
.alim-course-mnt{font-size:13px;font-weight:700;color:#F59E0B}
.alim-course-del{background:transparent;border:none;color:#475569;font-size:13px;cursor:pointer;padding:0 2px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const GAS_URL="https://script.google.com/macros/s/AKfycby0_v0SAuFnxUGBLPo4XzTYDy5Z0Hsnltao6pcZgTFS06X06KhFzy-jndgvHTEQpduH/exec";
const PIN_KEY="bf-pin",PIN_AUTH_KEY="bf-pin-auth",PIN_TRIES_KEY="bf-pin-tries",PIN_BLOCK_KEY="bf-pin-block";
const DEFAULT_PIN="7369",AUTH_DURATION=30*60*1000,MAX_TRIES=3,BLOCK_DURATION=3*60*1000;
const CATEGORIES_BASE=["logement","assurances","abonnements","crédits","vie courante","transport","enfants","animaux","autre"];
const CAT_COLORS_EXTRA=["#6366f1","#0ea5e9","#d946ef","#f97316","#14b8a6","#a855f7","#eab308","#78716c"];
function getCats(){try{const v=localStorage.getItem("bf-cats");if(v)return JSON.parse(v);}catch{}return[...CATEGORIES_BASE];}
function saveCats(cats){localStorage.setItem("bf-cats",JSON.stringify(cats));}
const CAT_COLORS={logement:"#3B82F6",assurances:"#10B981",abonnements:"#8B5CF6","crédits":"#EF4444","vie courante":"#F59E0B",transport:"#06B6D4",enfants:"#EC4899",animaux:"#84CC16",autre:"#9CA3AF"};
function getCatCustomColors(){try{const v=localStorage.getItem("bf-cat-colors");if(v)return JSON.parse(v);}catch{}return{};}
function saveCatCustomColor(cat,color){const cc=getCatCustomColors();cc[cat]=color;localStorage.setItem("bf-cat-colors",JSON.stringify(cc));}
function delCatCustomColor(cat){const cc=getCatCustomColors();delete cc[cat];localStorage.setItem("bf-cat-colors",JSON.stringify(cc));}
function getCatColor(cat){const custom=getCatCustomColors()[cat];if(custom)return custom;return CAT_COLORS[cat]||(CAT_COLORS_EXTRA[getCats().indexOf(cat)%CAT_COLORS_EXTRA.length]||"#9CA3AF");}
function addCustomCat(nom,color){
  const n=nom.trim().toLowerCase();if(!n)return false;
  const cats=getCats();if(cats.includes(n))return false;
  cats.push(n);saveCats(cats);
  if(color)saveCatCustomColor(n,color);
  return true;
}
function delCustomCat(nom){
  const cats=getCats().filter(c=>c!==nom);saveCats(cats);
  delCatCustomColor(nom);
}
function delCatAndReassign(nom){
  // Supprimer la catégorie
  delCustomCat(nom);
  // Réaffecter toutes les dépenses de cette catégorie à "autre" dans TOUS les mois
  const months=STATE.months;
  let changed=false;
  Object.keys(months).forEach(k=>{
    const m=months[k];
    const newDeps=m.depenses.map(d=>{
      if(d.categorie===nom){changed=true;return{...d,categorie:"autre"};}
      return d;
    });
    months[k]={...m,depenses:newDeps};
  });
  if(changed){
    DB.save(months);
    STATE.months={...months};
    notify("✓ Catégorie supprimée — dépenses réaffectées à \"autre\"");
  } else {
    notify("✓ Catégorie supprimée");
  }
}
const COMMERCES_BASE=["Leclerc","Lidl","Aldi","Carrefour","Intermarché","Super U","Casino","Monoprix","Franprix","Picard","Biocoop","Grand Frais"];
function getCommerces(){
  try{
    const v=localStorage.getItem("bf-commerces");
    if(v){
      let list=JSON.parse(v);
      // Migration forcée : toujours remplacer Bio c'Bon par Biocoop
      let changed=false;
      list=list.map(c=>{if(c==="Bio c' Bon"||c==="Bio c'Bon"||c==="Bio c' bon"){changed=true;return"Biocoop";}return c;});
      if(changed)localStorage.setItem("bf-commerces",JSON.stringify(list));
      return list;
    }
  }catch{}
  return[...COMMERCES_BASE];
}
function saveCommerces(list){localStorage.setItem("bf-commerces",JSON.stringify(list));}
function addCommerce(nom){const n=nom.trim();if(!n)return false;const list=getCommerces();if(list.map(x=>x.toLowerCase()).includes(n.toLowerCase()))return false;list.push(n);saveCommerces(list);return true;}
function delCommerce(nom){saveCommerces(getCommerces().filter(c=>c!==nom));}
const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const fmt=n=>(parseFloat(n)||0).toLocaleString("fr-FR",{style:"currency",currency:"EUR"});
const nowKey=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
const keyLabel=k=>{const[y,m]=k.split("-");return `${MOIS[+m-1]} ${y}`;};
const uid=()=>"x"+Date.now()+Math.random().toString(36).slice(2);
const todayStr=()=>{const d=new Date();return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;};

// PIN
function getPin(){return localStorage.getItem(PIN_KEY)||DEFAULT_PIN;}
function setPin(p){localStorage.setItem(PIN_KEY,p);}
function isAuthed(){const t=localStorage.getItem(PIN_AUTH_KEY);return t&&Date.now()-parseInt(t)<AUTH_DURATION;}
function setAuthed(){localStorage.setItem(PIN_AUTH_KEY,String(Date.now()));}
function getTries(){return parseInt(localStorage.getItem(PIN_TRIES_KEY)||"0");}
function setTries(n){localStorage.setItem(PIN_TRIES_KEY,String(n));}
function getBlockUntil(){return parseInt(localStorage.getItem(PIN_BLOCK_KEY)||"0");}
function setBlock(){localStorage.setItem(PIN_BLOCK_KEY,String(Date.now()+BLOCK_DURATION));}
function clearBlock(){localStorage.removeItem(PIN_BLOCK_KEY);localStorage.removeItem(PIN_TRIES_KEY);}

const BASE=[
  {type:"Loyer",montant:929.99,categorie:"logement"},{type:"Gaz",montant:200.00,categorie:"logement"},
  {type:"Électricité",montant:70.00,categorie:"logement"},{type:"Assurance Habitation",montant:19.50,categorie:"assurances"},
  {type:"Assurance Auto",montant:50.27,categorie:"assurances"},{type:"Box SFR",montant:59.99,categorie:"abonnements"},
  {type:"Tél Murielle+Netflix",montant:15.98,categorie:"abonnements"},{type:"Tél Gilles",montant:7.17,categorie:"abonnements"},
  {type:"Sofinco",montant:220.96,categorie:"crédits"},{type:"Cofidis",montant:96.58,categorie:"crédits"},
  {type:"BFM",montant:295.29,categorie:"crédits"},{type:"Opteven",montant:63.00,categorie:"assurances"},
  {type:"Mutuelle",montant:57.70,categorie:"assurances"},{type:"Mutuelle +",montant:78.11,categorie:"assurances"},
  {type:"Abonnement Illevia",montant:113.00,categorie:"abonnements"},{type:"École Poussin",montant:60.00,categorie:"enfants"},
  {type:"Spotify",montant:12.14,categorie:"abonnements"},{type:"Amazon Prime",montant:6.99,categorie:"abonnements"},
  {type:"Alimentation",montant:800.00,categorie:"vie courante"},{type:"Entretien chaudière",montant:14.90,categorie:"logement"},
  {type:"Essence",montant:70.00,categorie:"transport"},{type:"Réparation Prius",montant:269.37,categorie:"transport"},
  {type:"Croquettes",montant:48.48,categorie:"animaux"},{type:"Store porte",montant:34.99,categorie:"logement"},
  {type:"Ikéa",montant:74.58,categorie:"logement"},
];

function makeMonth(srcDeps,srcMonth){
  return {
    salaires:srcMonth?JSON.parse(JSON.stringify(srcMonth.salaires)):[{id:uid(),prenom:"Murielle",montant:1654.82},{id:uid(),prenom:"Gilles",montant:3048.64}],
    depenses:(srcDeps||BASE).map(d=>({...d,id:uid(),paye:false})),
    economies:srcMonth?JSON.parse(JSON.stringify(srcMonth.economies)).map(e=>({...e,id:uid()})):[{id:uid(),type:"Vacances / Mariage / Voiture",montant:250}],
    argentPoche:srcMonth?JSON.parse(JSON.stringify(srcMonth.argentPoche)):[{id:uid(),prenom:"Murielle",montant:392.24},{id:uid(),prenom:"Gilles",montant:392.24}],
    courses:[], // [{id, date, label, montant}]
  };
}

// Storage
let _saveTimer=null;
const DB={
  async load(){
    try{const r=await fetch(GAS_URL,{redirect:"follow"});const t=await r.text();if(t&&t.trim().startsWith("{"))return JSON.parse(t);}catch{}
    try{const v=localStorage.getItem("bf-local");if(v)return JSON.parse(v);}catch{}
    return null;
  },
  save(data){
    try{localStorage.setItem("bf-local",JSON.stringify(data));}catch{}
    clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>DB._send(data),800);
  },
  async _send(data){try{await fetch(GAS_URL,{method:"POST",body:JSON.stringify(data),headers:{"Content-Type":"text/plain"}});}catch{}}
};

// STATE
let STATE={
  screen:"pin",pinInput:"",pinError:"",pinShake:false,pinBlocked:false,pinBlockLeft:0,
  changePinStep:0,changePinOld:"",changePinNew:"",changePinInput:"",changePinError:"",
  months:{},curKey:nowKey(),tab:"dashboard",loading:true,lastSync:null,
  modal:null,filtre:"toutes",monthPick:false,toast:null,toastTimer:null,
};
function setState(p){Object.assign(STATE,p);render();}
function notify(msg,err=false){clearTimeout(STATE.toastTimer);const t=setTimeout(()=>setState({toast:null}),2800);setState({toast:{msg,err},toastTimer:t});}
function persist(months){DB.save(months);setState({months,lastSync:new Date()});notify("✓ Synchronisé");}
function updCur(fn){const m=fn(STATE.months[STATE.curKey]);const next={...STATE.months,[STATE.curKey]:m};persist(next);}

async function init(){
  // Migration : renommer "Bio c' Bon" en "Biocoop" dans les commerces sauvegardés
  try {
    const saved = localStorage.getItem("bf-commerces");
    if(saved){
      const list = JSON.parse(saved);
      const idx = list.indexOf("Bio c' Bon");
      if(idx !== -1){ list[idx]="Biocoop"; localStorage.setItem("bf-commerces",JSON.stringify(list)); }
    }
  } catch{}
  setState({loading:true});
  const data=await DB.load();
  if(data&&Object.keys(data).length>0){
    // migration : ajouter courses si absent
    Object.keys(data).forEach(k=>{if(!data[k].courses)data[k].courses=[];});
    setState({months:data,loading:false,lastSync:new Date()});
  } else {
    const k=nowKey();const init={[k]:makeMonth()};
    setState({months:init,loading:false,lastSync:new Date()});DB.save(init);
  }
  setInterval(async()=>{
    const d=await DB.load();
    if(d&&Object.keys(d).length>0){
      Object.keys(d).forEach(k=>{if(!d[k].courses)d[k].courses=[];});
      // Ne pas re-render si un formulaire est en cours de saisie
      if(STATE.modal){
        STATE.months=d; STATE.lastSync=new Date(); // màj silencieuse sans re-render
      } else {
        setState({months:d,lastSync:new Date()});
      }
    }
  },15000);
}

// Actions
function togglePaye(id){updCur(m=>({...m,depenses:m.depenses.map(d=>d.id===id?{...d,paye:!d.paye}:d)}));}
function saveItem(type,item){
  const u={...item,montant:parseFloat(item.montant)||0};
  if(type==="depense")  updCur(m=>({...m,depenses:m.depenses.map(d=>d.id===u.id?u:d)}));
  if(type==="salaire")  updCur(m=>({...m,salaires:m.salaires.map(s=>s.id===u.id?u:s)}));
  if(type==="economie") updCur(m=>({...m,economies:m.economies.map(e=>e.id===u.id?u:e)}));
  if(type==="poche")    updCur(m=>({...m,argentPoche:m.argentPoche.map(a=>a.id===u.id?u:a)}));
  setState({modal:null});
}
function delItem(type,id){
  if(type==="depense")  updCur(m=>({...m,depenses:m.depenses.filter(d=>d.id!==id)}));
  if(type==="economie") updCur(m=>({...m,economies:m.economies.filter(e=>e.id!==id)}));
  setState({modal:null});
}
function addItem(type,item){
  const u={...item,id:uid(),montant:parseFloat(item.montant)||0};
  if(type==="depense")  updCur(m=>({...m,depenses:[...m.depenses,{...u,paye:false}]}));
  if(type==="economie") updCur(m=>({...m,economies:[...m.economies,u]}));

// Courses alimentation
function addCourse(label,montant){
  const mnt=parseFloat(montant)||0;
  if(!mnt)return;
  setMonthsAndRender(m=>({...m,courses:sortCourses([...(m.courses||[]),{id:uid(),date:todayStr(),label:label||"Courses",montant:mnt}])}));
  setState({modal:null});
}
function delCourse(id){
  setMonthsAndRender(m=>({...m,courses:(m.courses||[]).filter(c=>c.id!==id)}));
}
function sortCourses(courses){
  return [...courses].sort((a,b)=>{
    const [da,ma]=a.date.split("/").map(Number);
    const [db,mb]=b.date.split("/").map(Number);
    if(ma!==mb)return mb-ma; // mois décroissant
    return db-da;            // jour décroissant = plus récent en premier
  });
}
function updateCourse(id,patch){
  setMonthsAndRender(m=>{
    const updated=(m.courses||[]).map(c=>c.id===id?{...c,...patch}:c);
    return{...m,courses:sortCourses(updated)};
  });
}
// Mise à jour immédiate + sync
function setMonthsAndRender(fn){
  const newMonth=fn(STATE.months[STATE.curKey]);
  const next={...STATE.months,[STATE.curKey]:newMonth};
  DB.save(next);
  STATE.months=next;
  STATE.lastSync=new Date();
  render();
  notify("✓ Synchronisé");
}

async function createMonth(key,copyKey){
  if(STATE.months[key]){setState({curKey:key,modal:null,monthPick:false});return;}
  const src=copyKey&&STATE.months[copyKey]?STATE.months[copyKey]:null;
  const nm=makeMonth(src?.depenses,src);
  const next={...STATE.months,[key]:nm};persist(next);
  setState({curKey:key,modal:null,monthPick:false});notify("✓ Mois créé !");
}

// PIN logic
function updatePinDots(error=false){
  const dots=document.querySelectorAll(".pin-dot");
  if(!dots.length){render();return;}
  dots.forEach((dot,i)=>{
    dot.className="pin-dot";
    if(STATE.pinInput.length>i)dot.classList.add(error?"error":"filled");
  });
  const errEl=document.querySelector(".pin-error");
  if(errEl)errEl.textContent=STATE.pinError||"";
}
function handlePinDigit(d){
  if(STATE.pinBlocked)return;
  const val=STATE.pinInput+d;
  STATE.pinInput=val;STATE.pinError="";
  updatePinDots();
  if(val.length===4){
    if(Date.now()<getBlockUntil()){STATE.pinBlocked=true;STATE.pinInput="";render();startBlockTimer();return;}
    if(val===getPin()){
      clearBlock();setAuthed();STATE.pinInput="";STATE.pinError="";
      setState({screen:"app"});init();
    } else {
      const tries=getTries()+1;setTries(tries);const left=MAX_TRIES-tries;
      if(tries>=MAX_TRIES){
        setBlock();STATE.pinInput="";STATE.pinError="";STATE.pinBlocked=true;
        render();startBlockTimer();
      } else {
        STATE.pinInput="";
        STATE.pinError=`Code incorrect — ${left} essai${left>1?"s":""} restant${left>1?"s":""}`;
        updatePinDots(true);
        setTimeout(()=>{STATE.pinError="";updatePinDots();},800);
      }
    }
  }
}
function handlePinDel(){
  STATE.pinInput=STATE.pinInput.slice(0,-1);
  STATE.pinError="";
  updatePinDots();
}
function startBlockTimer(){
  // Annuler tout timer précédent
  if(window._blockTimer)clearInterval(window._blockTimer);
  window._blockTimer=setInterval(()=>{
    const left=Math.ceil((getBlockUntil()-Date.now())/1000);
    if(left<=0){
      clearInterval(window._blockTimer);window._blockTimer=null;
      clearBlock();
      STATE.pinBlocked=false;STATE.pinBlockLeft="";STATE.pinError="";
      render();
    } else {
      const mins=Math.floor(left/60);
      const secs=left%60;
      const display=mins>0?`${mins}m ${String(secs).padStart(2,"0")}s`:`${secs}s`;
      STATE.pinBlockLeft=display;
      // Mettre à jour uniquement le texte si l'élément existe
      const el=document.getElementById("pin-countdown");
      if(el) el.textContent=`🔒 Accès bloqué — réessayez dans ${display}`;
    }
  },1000);
}
function updateChangePinDots(){
  const dots=document.querySelectorAll("#change-pin-dots .pin-dot");
  if(!dots.length)return;
  dots.forEach((dot,i)=>{
    dot.className="pin-dot";
    if(STATE.changePinInput.length>i)dot.classList.add("filled");
  });
  const errEl=document.getElementById("change-pin-err");
  if(errEl)errEl.textContent=STATE.changePinError||"";
  const stepEl=document.getElementById("change-pin-step");
  if(stepEl){
    const steps=["","Entrez votre code actuel","Entrez le nouveau code","Confirmez le nouveau code"];
    stepEl.textContent=steps[STATE.changePinStep]||"";
  }
}
function handleChangePinDigit(d){
  if(STATE.changePinStep===0)return;
  const val=STATE.changePinInput+d;
  STATE.changePinInput=val;STATE.changePinError="";
  updateChangePinDots();
  if(val.length===4){
    if(STATE.changePinStep===1){
      if(val===getPin()){STATE.changePinStep=2;STATE.changePinOld=val;STATE.changePinInput="";}
      else{STATE.changePinInput="";STATE.changePinError="Code actuel incorrect";}
      updateChangePinDots();
    }
    else if(STATE.changePinStep===2){
      STATE.changePinStep=3;STATE.changePinNew=val;STATE.changePinInput="";
      updateChangePinDots();
    }
    else if(STATE.changePinStep===3){
      if(val===STATE.changePinNew){
        setPin(val);STATE.changePinStep=0;STATE.changePinInput="";STATE.changePinError="";
        setState({modal:null});notify("✓ Code PIN modifié !");
      } else {
        STATE.changePinInput="";STATE.changePinError="Les codes ne correspondent pas";
        updateChangePinDots();
      }
    }
  }
}
function handleChangePinDel(){
  STATE.changePinInput=STATE.changePinInput.slice(0,-1);
  STATE.changePinError="";
  updateChangePinDots();
}

// Render helpers
function el(tag,attrs={},...ch){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){if(k==="className")e.className=v;else if(k.startsWith("on"))e[k.toLowerCase()]=v;else e.setAttribute(k,v);}
  for(const c of ch.flat()){if(c==null||c===false)continue;e.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  return e;
}
function div(cls,...ch){return el("div",{className:cls},...ch);}
function inp(type,val,onChange,ph=""){const i=el("input",{type,value:val||"",placeholder:ph});i.oninput=e=>onChange(e.target.value);return i;}
function sel(val,opts,onChange){const s=el("select",{});s.onchange=e=>onChange(e.target.value);opts.forEach(o=>{const op=el("option",{value:o});op.textContent=o;if(o===val)op.selected=true;s.appendChild(op);});return s;}

function render(){
  const root=document.getElementById("root");root.innerHTML="";
  if(STATE.screen==="pin"){root.appendChild(renderPin());return;}
  if(STATE.loading){root.appendChild(div("loader",div("spinner"),el("p",{style:"color:#94a3b8;margin-top:14px"},"Chargement…")));return;}
  root.appendChild(renderApp());
}

  wrap.append(el("div",{className:"pin-logo"},"💶"),el("h2",{className:"pin-title"},"Budget Familial"),el("p",{className:"pin-sub"},"Entrez votre code PIN"));

  wrap.appendChild(dots);
  const err=el("p",{className:"pin-error"});err.textContent=STATE.pinError||"";wrap.appendChild(err);
  if(STATE.pinBlocked){

function renderAlimentationCard(data){

  const depense=courses.reduce((a,c)=>a+(+c.montant||0),0);

  const ok=reste>=0;

  const pb=div("alim-pb");const pf=div("alim-pf");

  // Reste
  const resteEl=div("alim-reste");resteEl.style.color=ok?"#10B981":"#EF4444";

  // Historique courses
  // Calculer les jours disponibles du mois courant
  const curKey=STATE.curKey;
  const [curY,curM]=curKey.split("-").map(Number);
  const daysInMonth=new Date(curY,curM,0).getDate();
  const dayOptions=Array.from({length:daysInMonth},(_,i)=>{

  if(courses.length>0){

      // Ligne principale

      const del=el("button",{className:"alim-course-del"});del.textContent="✕";del.onclick=()=>delCourse(c.id);
      mainLine.append(dateBtn,lbl,mnt,del);
      row.appendChild(mainLine);

      // Panneau édition date (caché par défaut)
      const editPanel=div("");
      editPanel.style.cssText="display:none;background:#0f172a;border-radius:8px;padding:10px;margin-bottom:6px;gap:8px;flex-direction:column";

      // Sélecteur de jour
      const dateRow=div("");dateRow.style.cssText="display:flex;align-items:center;gap:8px";
      const dateLbl=el("span",{style:"color:#64748b;font-size:12px;flex-shrink:0"});dateLbl.textContent="Jour :";
      const dateSel=el("select",{});
      dateSel.style.cssText="flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#f1f5f9;font-size:14px";
      dayOptions.forEach(d=>{
        const o=el("option",{value:d});o.textContent=d;
        if(d===c.date)o.selected=true;
        dateSel.appendChild(o);
      });
      dateRow.append(dateLbl,dateSel);

      // Champ montant éditable
      const mntRow=div("");mntRow.style.cssText="display:flex;align-items:center;gap:8px";
      const mntLbl=el("span",{style:"color:#64748b;font-size:12px;flex-shrink:0"});mntLbl.textContent="Montant :";
      const mntInp=el("input",{type:"number",step:"0.01",value:c.montant});
      mntInp.style.cssText="flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#f1f5f9;font-size:14px";
      mntRow.append(mntLbl,mntInp);

      // Boutons valider / annuler
      const editBtns=div("");editBtns.style.cssText="display:flex;gap:8px";
      const saveB=el("button",{type:"button"});saveB.textContent="✓ Valider";
      saveB.style.cssText="flex:1;background:#3B82F6;border:none;color:#fff;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
      saveB.onclick=e=>{
        e.stopPropagation();
        updateCourse(c.id,{date:dateSel.value,montant:parseFloat(mntInp.value)||c.montant});
        editPanel.style.display="none";
      };
      const cancelB=el("button",{type:"button"});cancelB.textContent="Annuler";
      cancelB.style.cssText="flex:1;background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:7px;font-weight:700;font-size:13px;cursor:pointer";
      cancelB.onclick=e=>{e.stopPropagation();editPanel.style.display="none";};
      editBtns.append(saveB,cancelB);

      editPanel.append(dateRow,mntRow,editBtns);
      row.appendChild(editPanel);

      // Toggle panneau au clic sur la date
      dateBtn.onclick=e=>{
        e.stopPropagation();
        const isOpen=editPanel.style.display==="flex";
        editPanel.style.display=isOpen?"none":"flex";
      };

      hist.appendChild(row);
    });
    card.appendChild(hist);
  } else {
    const empty=el("p",{style:"color:#475569;font-size:12px;text-align:center;padding:8px 0"});
    empty.textContent="Aucune course enregistrée ce mois";
    card.appendChild(empty);
  }
  return card;
}

// DEPENSES
function renderDepenses(data){
  const filtre=STATE.filtre;const cats=["toutes",...getCats()];
  const list=filtre==="toutes"?data.depenses:data.depenses.filter(d=>d.categorie===filtre);
  const nb=data.depenses.filter(d=>d.paye).length;
  const pct=data.depenses.length?Math.round((nb/data.depenses.length)*100):0;
  const col=div("col");
  const mc=div("card");mc.style.padding="10px 14px";
  const ml=div("");ml.style.cssText="display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:6px";
  ml.innerHTML=`<span>${nb}/${data.depenses.length} réglées</span><span>${pct}%</span>`;
  const mpb=div("pb");const mpf=div("pf");mpf.style.width=pct+"%";mpb.appendChild(mpf);
  mc.append(ml,mpb);col.appendChild(mc);
  const fs=div("fscr");cats.forEach(c=>{const b=el("button",{className:"fbtn"+(filtre===c?" on":"")});b.textContent=c;b.onclick=()=>setState({filtre:c});fs.appendChild(b);});col.appendChild(fs);
  list.forEach(d=>{

    const info=div("");
    const name=el("div",{style:`color:${d.paye?"#64748b":"#f1f5f9"};font-weight:600;font-size:14px;text-decoration:${d.paye?"line-through":"none"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis`});
    name.textContent=d.type;
    const pill=el("span",{className:"pill",style:`background:${getCatColor(d.categorie)}`});pill.textContent=d.categorie;
    info.append(name,pill);
    const mnt=el("span",{style:`color:${d.paye?"#64748b":"#f1f5f9"};font-weight:700;font-size:14px;margin-right:8px`});mnt.textContent=fmt(d.montant);
    const eb=el("button",{className:"eBtn"});eb.textContent="✏️";eb.onclick=()=>setState({modal:{type:"edit",itemType:"depense",item:{...d}}});
    row.append(chk,info,mnt,eb);col.appendChild(row);
  });
  const ab=el("button",{className:"add-btn"});ab.textContent="+ Ajouter une dépense";
  ab.onclick=()=>setState({modal:{type:"add",itemType:"depense",item:{type:"",montant:"",categorie:"autre"}}});

// HISTORIQUE
function renderHistorique(months,allKeys){
  const col=div("col");
  if(allKeys.length<2){const c=div("card");c.innerHTML=`<p style="color:#64748b;text-align:center;padding:24px 0">📅 L'historique apparaîtra dès que vous aurez 2 mois enregistrés.</p>`;col.appendChild(c);return col;}
  const rows=allKeys.map(k=>{
    const m=months[k];
    const sal=m.salaires.reduce((a,x)=>a+(+x.montant||0),0);
    const dep=m.depenses.reduce((a,x)=>a+(+x.montant||0),0);
    const eco=m.economies.reduce((a,x)=>a+(+x.montant||0),0);
    const courses=(m.courses||[]).reduce((a,x)=>a+(+x.montant||0),0);
    const budgetAlim=m.depenses.find(d=>d.type==="Alimentation")?.montant||800;
    const pp=dep>0?Math.round((m.depenses.filter(d=>d.paye).reduce((a,x)=>a+(+x.montant||0),0)/dep)*100):0;
    return{k,label:keyLabel(k),sal,dep,eco,solde:sal-dep-eco,pp,courses,budgetAlim};
  });
  const maxDep=Math.max(...rows.map(r=>r.dep),1);
  const tc=div("card");tc.appendChild(el("h3",{className:"ct"},"Récapitulatif mensuel"));
  const t=el("table",{style:"width:100%;border-collapse:collapse;font-size:12px"});
  t.innerHTML=`<thead><tr style="color:#64748b"><th style="text-align:left;padding:4px 6px">Mois</th><th style="text-align:right;padding:4px 6px">Salaires</th><th style="text-align:right;padding:4px 6px">Dépenses</th><th style="text-align:right;padding:4px 6px">Solde</th></tr></thead>`;
  const tb=el("tbody",{});
  rows.forEach(r=>{const tr=el("tr",{style:"border-top:1px solid #1e3a5f"});tr.innerHTML=`<td style="padding:7px 6px;color:#cbd5e1;font-weight:600">${r.label}</td><td style="padding:7px 6px;text-align:right;color:#10B981;font-weight:600">${fmt(r.sal)}</td><td style="padding:7px 6px;text-align:right;color:#EF4444;font-weight:600">${fmt(r.dep)}</td><td style="padding:7px 6px;text-align:right;font-weight:700;color:${r.solde>=0?"#3B82F6":"#EF4444"}">${fmt(r.solde)}</td>`;tb.appendChild(tr);});
  t.appendChild(tb);tc.appendChild(t);col.appendChild(tc);

  // Alimentation historique
  const ac=div("card");ac.appendChild(el("h3",{className:"ct"},"🛒 Alimentation par mois"));
  rows.forEach(r=>{
    const pct=r.budgetAlim>0?Math.min(Math.round((r.courses/r.budgetAlim)*100),100):0;
    const ok=r.courses<=r.budgetAlim;
    const d=div("");d.style.marginBottom="12px";
    d.innerHTML=`
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span style="color:#94a3b8;font-weight:600">${r.label}</span>
        <span style="color:${ok?"#10B981":"#EF4444"};font-weight:700">${fmt(r.courses)} / ${fmt(r.budgetAlim)}</span>
      </div>
      <div style="background:#1e3a5f;border-radius:6px;height:8px;overflow:hidden">
        <div style="background:${pct>=100?"#EF4444":pct>=80?"#F59E0B":"#10B981"};height:100%;border-radius:6px;width:${pct}%"></div>
      </div>
      <div style="font-size:11px;color:#475569;margin-top:2px">${ok?"Reste : "+fmt(r.budgetAlim-r.courses):"Dépassement : "+fmt(r.courses-r.budgetAlim)}</div>`;
    ac.appendChild(d);
  });col.appendChild(ac);

  const bc=div("card");bc.appendChild(el("h3",{className:"ct"},"Évolution des dépenses"));
  rows.forEach(r=>{const d=div("");d.style.marginBottom="12px";d.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#94a3b8;font-weight:600">${r.label}</span><span style="color:#EF4444;font-weight:700">${fmt(r.dep)}</span></div><div style="background:#1e3a5f;border-radius:6px;height:8px;overflow:hidden"><div style="background:linear-gradient(90deg,#EF4444,#F59E0B);height:100%;border-radius:6px;width:${Math.round((r.dep/maxDep)*100)}%"></div></div><div style="font-size:11px;color:#475569;margin-top:2px">Réglé : ${r.pp}%</div>`;bc.appendChild(d);});col.appendChild(bc);

  const ecc=div("card");ecc.appendChild(el("h3",{className:"ct"},"Épargne cumulée"));
  let cum=0;[...rows].reverse().forEach(r=>{cum+=r.eco;const li=div("li");li.innerHTML=`<span style="color:#94a3b8;font-size:13px">${r.label}</span><div style="text-align:right"><div style="color:#F59E0B;font-weight:700;font-size:13px">${fmt(r.eco)}/mois</div><div style="color:#64748b;font-size:11px">Cumulé : ${fmt(cum)}</div></div>`;ecc.appendChild(li);});col.appendChild(ecc);
  return col;
}

// MODALS
function renderModal(modal,data,months,allKeys){
  const ol=div("overlay");ol.onclick=()=>setState({modal:null});
  const m=div("modal");m.onclick=e=>e.stopPropagation();

  // ── Ajouter une course ──
  if(modal.type==="addCourse"){
    // Persister les valeurs du formulaire dans STATE
    if(!STATE.courseForm)STATE.courseForm={commerce:getCommerces()[0]||"Courses",montant:""};
    const cf=STATE.courseForm;
    const courses=data.courses||[];
    const budget=data.depenses.find(d=>d.type==="Alimentation")?.montant||800;
    const dejaDepense=courses.reduce((a,c)=>a+(+c.montant||0),0);
    const resteAvant=budget-dejaDepense;

    m.appendChild(el("h2",{className:"mt"},"🛒 Ajouter des courses"));

    // Info budget
    const infoHaut=div("");infoHaut.style.cssText="background:#0f172a;border-radius:8px;padding:10px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center";
    infoHaut.innerHTML=`<div><div style="font-size:11px;color:#64748b">Budget</div><div style="font-size:15px;font-weight:800;color:#F59E0B">${fmt(budget)}</div></div><div style="text-align:center"><div style="font-size:11px;color:#64748b">Dépensé</div><div style="font-size:15px;font-weight:800;color:#EF4444">${fmt(dejaDepense)}</div></div><div style="text-align:right"><div style="font-size:11px;color:#64748b">Reste</div><div style="font-size:15px;font-weight:800;color:${resteAvant>=0?"#10B981":"#EF4444"}">${fmt(resteAvant)}</div></div>`;
    m.appendChild(infoHaut);

    // ── Sélecteur de commerce ──
    m.appendChild(el("label",{},"Commerce"));
    const commerceWrap=div("");commerceWrap.style.cssText="display:flex;flex-direction:column;gap:8px;margin-top:4px";

    // Liste des commerces en boutons
    const commerceList=div("");commerceList.style.cssText="display:flex;flex-wrap:wrap;gap:6px";
    function renderCommerces(){
      commerceList.innerHTML="";
      getCommerces().forEach(c=>{
        const btn=div("");
        btn.style.cssText=`padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid ${c===cf.commerce?"#3B82F6":"#334155"};background:${c===cf.commerce?"#1d4ed8":"transparent"};color:${c===cf.commerce?"#fff":"#94a3b8"};transition:all .15s`;
        btn.textContent=c;
        btn.onclick=e=>{e.stopPropagation();cf.commerce=c;renderCommerces();};
        if(!COMMERCES_BASE.includes(c)){
          const del=el("span",{});del.textContent=" ✕";del.style.cssText="font-size:10px;opacity:.7;cursor:pointer";
          del.onclick=e=>{
            e.stopPropagation();
            delCommerce(c);
            if(cf.commerce===c)cf.commerce=getCommerces()[0]||"Courses";
            renderCommerces();
          };
          btn.appendChild(del);
        }
        commerceList.appendChild(btn);
      });
    }
    renderCommerces();
    commerceWrap.appendChild(commerceList);

    // Zone ajout nouveau commerce
    const newCommerceWrap=div("");newCommerceWrap.style.cssText="display:flex;gap:8px;margin-top:4px";
    const newCommerceInp=el("input",{type:"text",placeholder:"Nouveau commerce…"});
    newCommerceInp.style.cssText="flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#f1f5f9;font-size:14px";
    newCommerceInp.onclick=e=>e.stopPropagation();
    const newCommerceBtn=el("button",{type:"button"});newCommerceBtn.textContent="+ Ajouter";
    newCommerceBtn.style.cssText="background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap";
    newCommerceBtn.onclick=e=>{
      e.stopPropagation();
      const nom=newCommerceInp.value.trim();
      if(!nom)return;
      if(addCommerce(nom)){
        cf.commerce=nom;
        renderCommerces();
        newCommerceInp.value="";
        notify("✓ Commerce ajouté !");
      } else {
        notify("Ce commerce existe déjà");
      }
    };
    newCommerceWrap.append(newCommerceInp,newCommerceBtn);
    commerceWrap.appendChild(newCommerceWrap);
    m.appendChild(commerceWrap);

    // Montant
    m.appendChild(el("label",{style:"margin-top:12px"},"Montant (€)"));
    const mi=el("input",{type:"number",step:"0.01",value:cf.montant||"",placeholder:"0.00"});mi.style.marginTop="4px";

    // Reste après
    const resteApresBox=div("");resteApresBox.style.cssText="background:#0f172a;border-radius:8px;padding:12px;margin-top:12px;text-align:center";
    const apresInit=resteAvant-(parseFloat(cf.montant)||0);
    const okInit=apresInit>=0;
    resteApresBox.innerHTML=`<div style="font-size:11px;color:#64748b;margin-bottom:4px">Reste après cette course</div><div style="font-size:22px;font-weight:900;color:${okInit?"#10B981":"#EF4444"}">${okInit?fmt(apresInit):"−"+fmt(Math.abs(apresInit))}</div>`;
    mi.oninput=e=>{
      cf.montant=e.target.value;
      const apres=resteAvant-(parseFloat(cf.montant)||0);
      const ok=apres>=0;
      resteApresBox.innerHTML=`<div style="font-size:11px;color:#64748b;margin-bottom:4px">Reste après cette course</div><div style="font-size:22px;font-weight:900;color:${ok?"#10B981":"#EF4444"}">${ok?fmt(apres):"−"+fmt(Math.abs(apres))}</div>${!ok?'<div style="font-size:11px;color:#EF4444;margin-top:4px">⚠ Budget dépassé !</div>':""}`;
    };
    m.appendChild(mi);
    m.appendChild(resteApresBox);

    const btns=div("mbtns");
    const sv=el("button",{className:"b-save"});sv.textContent="✓ Ajouter";
    sv.onclick=e=>{e.stopPropagation();if(cf.montant){addCourse(cf.commerce,cf.montant);STATE.courseForm=null;}};
    const ca=el("button",{className:"b-can"});ca.textContent="Annuler";ca.onclick=()=>{STATE.courseForm=null;setState({modal:null});};
    btns.append(sv,ca);m.appendChild(btns);
  }

  // ── Changer PIN ──
  else if(modal.type==="changePin"){
    const steps=["","Entrez votre code actuel","Entrez le nouveau code","Confirmez le nouveau code"];
    m.appendChild(el("h2",{className:"mt"},"🔑 Changer le code PIN"));
    const step=el("p",{id:"change-pin-step",style:"font-size:13px;color:#94a3b8;margin-bottom:12px"});
    step.textContent=steps[STATE.changePinStep]||"";m.appendChild(step);
    const dots=div("pin-dots");dots.id="change-pin-dots";dots.style.cssText="justify-content:center;margin-bottom:20px";

    ca.onclick=()=>setState({modal:null,changePinStep:0,changePinInput:""});m.appendChild(ca);
  }

  // ── Edit / Add ──
  else if(modal.type==="edit"||modal.type==="add"){
    // On stocke l'item dans STATE.modalItem pour survivre aux re-renders (sync 15s)
    if(!STATE.modalItem||STATE.modalItem._modalId!==modal._modalId){

    if(itemType==="depense"||itemType==="economie"){

      const allCats=getCats();
      allCats.forEach(c=>{const o=el("option",{value:c});o.textContent=c;if(c===(item.categorie||"autre"))o.selected=true;catSel.appendChild(o);});

      const colorLabel=el("p",{style:"color:#94a3b8;font-size:12px;font-weight:700;margin-bottom:4px"});colorLabel.textContent="Couleur";
      const colorGrid=div("");colorGrid.style.cssText="display:flex;flex-wrap:wrap;gap:8px";
      PALETTE.forEach(color=>{
        const swatch=div("");
        swatch.style.cssText=`width:28px;height:28px;border-radius:50%;background:${color};cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0`;
        if(color===selectedColor)swatch.style.border="3px solid #fff";
        swatch.onclick=e=>{
          e.stopPropagation();
          selectedColor=color;
          colorGrid.querySelectorAll("div").forEach(s=>s.style.border="3px solid transparent");
          swatch.style.border="3px solid #fff";
          previewTag.style.background=color;
        };
        colorGrid.appendChild(swatch);
      });

      // Aperçu
      const previewWrap=div("");previewWrap.style.cssText="display:flex;align-items:center;gap:8px";
      const previewLbl=el("span",{style:"color:#64748b;font-size:12px"});previewLbl.textContent="Aperçu :";
      const previewTag=div("");previewTag.style.cssText=`background:${selectedColor};color:#fff;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700`;
      previewTag.textContent="nouvelle catégorie";
      newCatInp.oninput=e=>{previewTag.textContent=e.target.value||"nouvelle catégorie";};
      previewWrap.append(previewLbl,previewTag);

      // Boutons créer / annuler
      const newCatBtns=div("");newCatBtns.style.cssText="display:flex;gap:8px";
      const newCatBtn=el("button",{type:"button"});newCatBtn.textContent="✓ Créer";
      newCatBtn.style.cssText="flex:1;background:#3B82F6;border:none;color:#fff;border-radius:8px;padding:10px;font-weight:700;font-size:14px;cursor:pointer";
      const newCatCancel=el("button",{type:"button"});newCatCancel.textContent="Annuler";
      newCatCancel.style.cssText="flex:1;background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:10px;font-weight:700;font-size:14px;cursor:pointer";
      newCatCancel.onclick=e=>{e.stopPropagation();newCatWrap.style.display="none";catSel.value=item.categorie||"autre";};
      newCatBtns.append(newCatBtn,newCatCancel);

      const newCatErr=el("p",{});newCatErr.style.cssText="color:#EF4444;font-size:12px;min-height:16px";
      newCatWrap.append(newCatInp,colorLabel,colorGrid,previewWrap,newCatBtns,newCatErr);

      catSel.onchange=e=>{
        if(e.target.value==="__new__"){
          newCatWrap.style.display="flex";
          newCatInp.focus();
        } else if(e.target.value==="__manage__"){
          // Sauvegarder le modal courant et ouvrir le gestionnaire
          const prevModal=STATE.modal;
          setState({modal:{type:"manageCats",prevModal}});
        } else {
          item.categorie=e.target.value;
          newCatWrap.style.display="none";
        }
      };
      if(item.categorie&&item.categorie!=="autre")catSel.value=item.categorie;
      item.categorie=item.categorie||"autre";

      newCatBtn.onclick=e=>{
        e.stopPropagation();
        const nom=newCatInp.value.trim().toLowerCase();
        if(!nom){newCatErr.textContent="Entrez un nom de catégorie";return;}
        if(getCats().includes(nom)){newCatErr.textContent="Cette catégorie existe déjà";catSel.value=nom;item.categorie=nom;newCatWrap.style.display="none";return;}
        addCustomCat(nom,selectedColor);
        // Ajouter au select avant les 2 dernières options
        const o=el("option",{value:nom});o.textContent=nom;
        catSel.insertBefore(o,catSel.options[catSel.options.length-2]);
        catSel.value=nom;item.categorie=nom;
        newCatWrap.style.display="none";
        newCatInp.value="";newCatErr.textContent="";
        notify("✓ Catégorie créée !");
      };

      catWrap.append(catSel,newCatWrap);m.appendChild(catWrap);
    }
    const btns=div("mbtns");
    const sv=el("button",{className:"b-save"});sv.textContent="Sauvegarder";
    sv.onclick=()=>{STATE.modalItem=null;isEdit?saveItem(itemType,item):addItem(itemType,item);};
    btns.appendChild(sv);
    if(isEdit&&(itemType==="depense"||itemType==="economie")){const d=el("button",{className:"b-del"});d.textContent="🗑";d.onclick=()=>{STATE.modalItem=null;delItem(itemType,item.id);};btns.appendChild(d);}
    const ca=el("button",{className:"b-can"});ca.textContent="Annuler";ca.onclick=()=>{STATE.modalItem=null;setState({modal:null});};btns.appendChild(ca);m.appendChild(btns);
  }

  // ── Nouveau mois ──
  else if(modal.type==="newMonth"){
    const now=new Date();let year=now.getFullYear(),month=now.getMonth()+1,copy="";
    m.appendChild(el("h2",{className:"mt"},"Nouveau mois"));
    m.appendChild(el("label",{},"Année"));m.appendChild(sel(String(year),["2024","2025","2026","2027"],v=>{year=+v;}));
    m.appendChild(el("label",{},"Mois"));
    const ms=el("select",{});ms.style.cssText="width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:15px;margin-top:4px";
    MOIS.forEach((nm,i)=>{const o=el("option",{value:String(i+1)});o.textContent=nm;if(i+1===month)o.selected=true;ms.appendChild(o);});
    ms.onchange=e=>{month=+e.target.value;};m.appendChild(ms);
    m.appendChild(el("label",{},"Copier depuis"));
    const so=["— Modèle de base —",...allKeys.map(k=>keyLabel(k))];
    m.appendChild(sel("",so,v=>{copy=allKeys[so.indexOf(v)-1]||"";}));
    const btns=div("mbtns");
    const go=el("button",{className:"b-save"});go.textContent="✓ Créer le mois";go.onclick=()=>createMonth(`${year}-${String(month).padStart(2,"0")}`,copy||null);
    const ca=el("button",{className:"b-can"});ca.textContent="Annuler";ca.onclick=()=>setState({modal:null});
    btns.append(go,ca);m.appendChild(btns);
  }

  // ── Gérer / supprimer catégories ──
  else if(modal.type==="manageCats"){
    m.appendChild(el("h2",{className:"mt"},"🗂 Gérer les catégories"));

    const allCats=getCats();
    const customCats=allCats.filter(c=>!CATEGORIES_BASE.includes(c));

    // Catégories de base (non supprimables)
    const baseSection=div("");baseSection.style.cssText="margin-bottom:16px";
    baseSection.appendChild(el("p",{style:"color:#64748b;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px"},"Catégories de base"));
    const baseList=div("");baseList.style.cssText="display:flex;flex-wrap:wrap;gap:6px";
    CATEGORIES_BASE.forEach(c=>{
      const tag=div("");tag.style.cssText=`background:${getCatColor(c)};color:#fff;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700`;
      tag.textContent=c;baseList.appendChild(tag);
    });
    baseSection.appendChild(baseList);
    m.appendChild(baseSection);

    // Catégories personnalisées (supprimables)
    const customSection=div("");
    customSection.appendChild(el("p",{style:"color:#64748b;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px"},"Catégories personnalisées"));

    const listWrap=div(""); listWrap.id="custom-cat-list";
    function renderCustomList(){
      listWrap.innerHTML="";
      const current=getCats().filter(c=>!CATEGORIES_BASE.includes(c));
      if(current.length===0){
        const p=el("p",{style:"color:#475569;font-size:13px;padding:8px 0"});p.textContent="Aucune catégorie personnalisée";listWrap.appendChild(p);return;
      }
      current.forEach(c=>{
        const row=div("");row.style.cssText="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#0f172a;border-radius:8px;margin-bottom:6px";
        const left=div("");left.style.cssText="display:flex;align-items:center;gap:8px";
        const dot=div("");dot.style.cssText=`width:10px;height:10px;border-radius:50%;background:${getCatColor(c)};flex-shrink:0`;
        const lbl=el("span",{style:"color:#cbd5e1;font-size:14px;font-weight:600"});lbl.textContent=c;
        left.append(dot,lbl);

        // Compter les dépenses concernées
        let nb=0;
        Object.values(STATE.months).forEach(mo=>mo.depenses.forEach(d=>{if(d.categorie===c)nb++;}));
        const count=el("span",{style:"color:#64748b;font-size:11px;margin-left:4px"});
        count.textContent=nb>0?`(${nb} dépense${nb>1?"s":""})` :"";
        left.appendChild(count);

        const rowBtns=div("");rowBtns.style.cssText="display:flex;gap:6px";

        // Bouton changer couleur
        const colorB=el("button",{});colorB.textContent="🎨";
        colorB.style.cssText="background:#334155;border:none;color:#fff;border-radius:8px;padding:5px 8px;font-size:14px;cursor:pointer";
        colorB.title="Changer la couleur";
        colorB.onclick=()=>{
          // Retirer le panneau si déjà ouvert
          const existing=row.querySelector(".color-picker-inline");
          if(existing){existing.remove();return;}
          const PALETTE=["#3B82F6","#10B981","#8B5CF6","#EF4444","#F59E0B","#06B6D4","#EC4899","#84CC16","#f97316","#6366f1","#14b8a6","#d946ef","#0ea5e9","#a855f7","#eab308","#78716c","#e11d48","#0d9488"];
          const picker=div("color-picker-inline");picker.style.cssText="display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:#1e293b;border-radius:8px;margin-top:6px";
          PALETTE.forEach(color=>{
            const sw=div("");sw.style.cssText=`width:24px;height:24px;border-radius:50%;background:${color};cursor:pointer;border:${getCatColor(c)===color?"2px solid #fff":"2px solid transparent"}`;
            sw.onclick=()=>{
              saveCatCustomColor(c,color);
              dot.style.background=color;
              picker.remove();
              notify("✓ Couleur modifiée !");
              renderCustomList();
            };
            picker.appendChild(sw);
          });
          row.appendChild(picker);
        };

        const delB=el("button",{});delB.textContent="🗑";
        delB.style.cssText="background:#7f1d1d;border:none;color:#fca5a5;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer";
        rowBtns.append(colorB,delB);
        delB.onclick=()=>{
          const confirm=div("");confirm.style.cssText="background:#1e293b;border:1px solid #EF4444;border-radius:8px;padding:10px;margin-top:6px";
          if(nb>0){
            confirm.innerHTML=`<p style="color:#fca5a5;font-size:13px;margin-bottom:8px">⚠ <strong>${nb} dépense${nb>1?"s":""}</strong> seront réaffectée${nb>1?"s":""} à <strong>"autre"</strong>.</p>`;
          } else {
            confirm.innerHTML=`<p style="color:#94a3b8;font-size:13px;margin-bottom:8px">Supprimer la catégorie <strong>"${c}"</strong> ?</p>`;
          }
          const confirmBtns=div("");confirmBtns.style.cssText="display:flex;gap:8px";
          const yes=el("button",{});yes.textContent="✓ Confirmer";yes.style.cssText="flex:1;background:#EF4444;border:none;color:#fff;border-radius:8px;padding:8px;font-weight:700;font-size:13px;cursor:pointer";
          yes.onclick=()=>{
            delCatAndReassign(c);
            renderCustomList();
          };
          const no=el("button",{});no.textContent="Annuler";no.style.cssText="flex:1;background:#334155;border:none;color:#94a3b8;border-radius:8px;padding:8px;font-weight:700;font-size:13px;cursor:pointer";
          no.onclick=()=>confirm.remove();
          confirmBtns.append(yes,no);confirm.appendChild(confirmBtns);
          row.appendChild(confirm);
          // Masquer le bouton supprimer
          delB.style.display="none";
        };
        row.append(left,rowBtns);listWrap.appendChild(row);
      });
    }
    renderCustomList();
    customSection.appendChild(listWrap);
    m.appendChild(customSection);

    const ca=el("button",{className:"b-can",style:"margin-top:20px;width:100%"});ca.textContent="← Retour";
    ca.onclick=()=>setState({modal:modal.prevModal||null});
    m.appendChild(ca);
  }

  ol.appendChild(m);return ol;
}

// START
if(isAuthed()){setState({screen:"app"});init();}
else setState({screen:"pin"});
</script>
</body>
</html>
